function confirmDel(id,username){
  const val=document.getElementById('dc').value.trim();
  const err=document.getElementById('derr');
  if(val!==username){err.textContent=`Sai username. Hãy nhập đúng "${username}".`;return;}
  S.users=S.users.filter(x=>x.id!==id);
  Object.keys(S.asn).forEach(tid=>{S.asn[tid]=(S.asn[tid]||[]).filter(uid=>uid!==id);});
  save();closeModal();rp('admin');showToast(`Đã xoá tài khoản @${username}.`,'red');
}

// ═══════════════════════════════════════════════
// TASK DETAIL
// ═══════════════════════════════════════════════
function openTask(id){
  const task=S.tasks.find(t=>t.id===id);if(!task)return;
  const dl=dlS(task.deadline,task.status);
  const aIds=S.asn[id]||[];
  const cmts=(S.cmts[id]||[]).map(c=>{
    const u=uby(c.uid);
    return`<div class="cmt">${avH(u,'av av26')}<div class="cmtb"><div class="cmta">${esc(u?.full_name||'?')}<span class="cmtt">${fdt(c.at)}</span></div><div class="cmtc">${esc(c.text)}</div></div></div>`;
  }).join('');
  const lglog=(S.logs[id]||[]).map(l=>`<div class="li"><div class="lic">${esc(l.i)}</div><div><div class="lit">${esc(l.t)}</div><div class="lim">${esc(l.ts)}</div></div></div>`).join('');

  // ── Checklist đơn giản ──
  const dc=(task.subs||[]).filter(s=>s.d).length;
  const pct=task.subs?.length?Math.round(dc/task.subs.length*100):0;
  const checks=(task.subs||[]).map((s,i)=>`<div class="chi ${s.d?'chd':''}"><input type="checkbox" ${s.d?'checked':''} onchange="togSub('${esc(id)}',${i})"><span>${esc(s.t)}</span></div>`).join('');

  // ── Subtask đầy đủ ──
  const subtasks=S.tasks.filter(t=>t.parentId===id);
  const stHtml=subtasks.map(st=>{
    const sdl=dlS(st.deadline,st.status);
    const saIds=S.asn[st.id]||[];
    const savs=saIds.slice(0,2).map(uid=>avH(uby(uid),'av av20')).join('');
    const sdc=(st.subs||[]).filter(s=>s.d).length;
    const spct=st.subs?.length?Math.round(sdc/st.subs.length*100):null;
    return`<div class="strow" onclick="openTask('${esc(st.id)}')">
      <div style="width:3px;height:36px;background:${st.status==='done'?'var(--green)':st.status==='inprogress'?'var(--acc)':'var(--bd2)'};border-radius:2px;flex-shrink:0"></div>
      <div class="strow-info">
        <div class="strow-title">${esc(st.title)}</div>
        <div class="strow-meta">
          ${pb(st.priority)} ${sb(st.status)}
          ${sdl.l?`<span class="${sdl.c}">${sdl.l}</span>`:''}
          ${st.deadline?`<span>${fd(st.deadline)}</span>`:''}
          ${spct!==null?`<span style="color:var(--acc)">${spct}%</span>`:''}
        </div>
      </div>
      <div class="avs">${savs}</div>
    </div>`;
  }).join('')||'';

  const ssts=['todo','inprogress','inreview','done'];
  const sLab={todo:'Todo',inprogress:'In Progress',inreview:'In Review',done:'Done'};
  const sflow=ssts.map((s,i)=>`${i>0?'<span class="sarr">→</span>':''}<div class="ss ${s} ${task.status===s?'on':''}" onclick="chgStatus('${esc(id)}','${s}')">${sLab[s]}</div>`).join('');
  const canEdit=S.cur.role!=='member'||task.creator===S.cur.id;

  // Badge cha/con
  const isSubtask=!!task.parentId;
  const parentTask=isSubtask?S.tasks.find(t=>t.id===task.parentId):null;

  showModal(`
  <div class="mh">
    <div style="flex:1">
      ${isSubtask&&parentTask?`<div style="font-size:10px;color:var(--tx3);margin-bottom:5px;display:flex;align-items:center;gap:5px"><span>└ Subtask của:</span><span style="color:var(--acc);cursor:pointer;text-decoration:underline" onclick="closeModal();setTimeout(()=>openTask('${esc(parentTask.id)}'),50)">${esc(parentTask.title)}</span></div>`:''}
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px">${pb(task.priority)} ${sb(task.status)} ${(task.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
      <div style="font-size:15px;font-weight:700;line-height:1.3">${esc(task.title)}</div>
    </div>
    <button class="cx" onclick="closeModal()">×</button>
  </div>
  <div class="mb">
    <div class="sf">${sflow}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px">
      <div style="background:var(--s2);border-radius:var(--r);padding:9px 12px"><div style="font-size:10px;color:var(--tx3);margin-bottom:4px">Người thực hiện</div><div style="display:flex;gap:6px;flex-wrap:wrap">${aIds.map(uid=>{const u=uby(uid);return`<span style="display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500">${avH(u,'av av20')}${esc(u?.full_name||'')}</span>`;}).join('')||'<span style="color:var(--tx3);font-size:11px">Chưa giao</span>'}</div></div>
      <div style="background:var(--s2);border-radius:var(--r);padding:9px 12px"><div style="font-size:10px;color:var(--tx3);margin-bottom:4px">Deadline</div><div class="${dl.c}" style="font-size:12px;font-weight:600">${fd(task.deadline)} ${dl.l?`(${dl.l})`:''}</div></div>
    </div>
    <div style="background:var(--s2);border-radius:var(--r);padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font-size:10px;color:var(--tx3)">Nguồn gốc:</span>
      ${(()=>{const creator=uby(task.creator);if(task.selfCreated||task.creator===S.cur.id&&!(S.asn[id]||[]).some(uid=>uid!==task.creator)){return`<span class="ptbadge pt-self">Tự tạo</span> ${avH(creator,'av av20')} <span style="font-size:11px;color:var(--tx)">${esc(creator?.full_name||'?')}</span>`;}return`<span class="ptbadge pt-recv">Được giao</span> ${avH(creator,'av av20')} <span style="font-size:11px;color:var(--tx)">${esc(creator?.full_name||'?')}</span>`;})()}
      <span style="font-size:10px;color:var(--tx3);margin-left:auto">Tạo: ${fd(task.created)}</span>
    </div>
    ${task.desc?`<div style="font-size:12px;color:var(--tx2);line-height:1.7;margin-bottom:12px">${esc(task.desc)}</div>`:''}

    ${!isSubtask?`
    <!-- SUBTASK ĐẦY ĐỦ -->
    <div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px">Subtask (${subtasks.length})</div>
        ${canEdit?`<button class="gbtn" onclick="openCreateSubtask('${esc(id)}')">+ Thêm subtask</button>`:''}
      </div>
      ${stHtml||`<div style="font-size:11px;color:var(--tx3);padding:6px 0">Chưa có subtask nào. ${canEdit?'Nhấn "+ Thêm subtask" để tạo.':''}</div>`}
    </div>`:''}

    <!-- CHECKLIST NHANH -->
    ${task.subs?.length?`<div style="margin-bottom:14px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px"><div style="font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px">Checklist — ${dc}/${task.subs.length}</div><span style="font-size:10px;color:var(--tx3)">${pct}%</span></div>${checks}<div class="pb"><div class="pf" style="width:${pct}%;background:var(--acc)"></div></div></div>`:''}

    <div class="dv"></div>
    <div style="font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:9px;text-transform:uppercase;letter-spacing:.4px">Bình luận</div>
    ${cmts||'<div style="font-size:11px;color:var(--tx3);margin-bottom:9px">Chưa có bình luận.</div>'}
    <div style="display:flex;gap:7px;margin-bottom:14px"><input class="fi2" id="nc" placeholder="Viết bình luận..." style="flex:1"><button class="btn bp bsm" onclick="addCmt('${esc(id)}')">Gửi</button></div>
    <div class="dv"></div>
    <div style="font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:9px;text-transform:uppercase;letter-spacing:.4px">Lịch sử thay đổi</div>
    ${lglog||'<div style="font-size:11px;color:var(--tx3)">Không có lịch sử.</div>'}
  </div>
  <div class="mf">
    ${canEdit?`<button class="btn bd2 bsm" onclick="closeModal();setTimeout(()=>deleteTask('${esc(id)}'),50)">Xoá</button>`:''}
    <button class="btn" onclick="closeModal()">Đóng</button>
    ${canEdit?`<button class="btn bp" onclick="openEditTask('${esc(id)}')">Chỉnh sửa</button>`:''}
  </div>`,'mlg');
}

function chgStatus(id,ns){
  const task=S.tasks.find(t=>t.id===id);if(!task)return;
  // Kiểm tra quyền: member chỉ được đổi task được giao cho mình
  if(S.cur.role==='member'&&!(S.asn[id]||[]).includes(S.cur.id)){
    showToast('Bạn không có quyền thay đổi trạng thái task này.','red');return;
  }
  const lab={todo:'Todo',inprogress:'In Progress',inreview:'In Review',done:'Done'};
  const old=task.status;task.status=ns;
  if(!S.logs[id])S.logs[id]=[];
  S.logs[id].push({i:'◆',t:`${lab[old]} → ${lab[ns]} bởi ${S.cur.full_name}`,ts:new Date().toLocaleTimeString('vi-VN')});
  pushN(`"${task.title}" → ${lab[ns]}`,id);
  save();openTask(id);rp(S.page);
}

function togSub(tid,idx){
  const task=S.tasks.find(t=>t.id===tid);if(!task)return;
  task.subs[idx].d=!task.subs[idx].d;
  save();openTask(tid);
}

function addCmt(tid){
  const input=document.getElementById('nc');
  const text=input.value.trim();
  if(!text)return;
  if(text.length>2000){
    showToast('Bình luận tối đa 2000 ký tự.','amber');return;
  }
  if(!S.cmts[tid])S.cmts[tid]=[];
  S.cmts[tid].push({id:'c'+Date.now(),uid:S.cur.id,text,at:new Date().toISOString()});
  pushN(`${S.cur.full_name} comment trên task`,tid);
  save();openTask(tid);
}

function openCreateTask(editId=null){
  const task=editId?S.tasks.find(t=>t.id===editId):null;
  const aIds=editId?(S.asn[editId]||[]):[];
  const isMember=S.cur.role==='member';

  // Chọn người nhận: Admin/Manager thấy checkbox; Member tự gán cho mình
  const assigneeSection=isMember
    ?`<div class="fg"><label class="fl">Người thực hiện</label>
       <div style="background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:8px">
         ${avH(S.cur,'av av20')} <b style="color:var(--tx)">${esc(S.cur.full_name)}</b> <span style="color:var(--tx3)">(tự thực hiện)</span>
       </div>
     </div>`
    :`<div class="fg"><label class="fl">Giao cho</label><div style="background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:10px;max-height:120px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:2px 14px">${S.users.filter(u=>u.role!=='admin').map(u=>`<label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;padding:3px 0"><input type="checkbox" value="${esc(u.id)}" ${aIds.includes(u.id)?'checked':''} style="accent-color:var(--acc)">${avH(u,'av av20')} ${esc(u.full_name)} <span style="font-size:10px;color:var(--tx3)">@${esc(u.username)}</span></label>`).join('')}</div></div>`;

  showModal(`
  <div class="mh"><div style="font-size:14px;font-weight:700">${task?'Chỉnh sửa task':'Tạo task mới'}</div><button class="cx" onclick="closeModal()">×</button></div>
  <div class="mb">
    <div class="fg"><label class="fl">Tiêu đề *</label><input class="fi2" id="ft-t" value="${esc(task?.title||'')}" placeholder="Nhập tiêu đề task..."></div>
    <div class="fg"><label class="fl">Mô tả</label><textarea class="fi2" id="ft-d" placeholder="Mô tả chi tiết...">${esc(task?.desc||'')}</textarea></div>
    <div class="frow">
      <div class="fg"><label class="fl">Độ ưu tiên</label><select class="fi2" id="ft-p">${['low','medium','high','critical'].map(p=>`<option value="${p}" ${task?.priority===p?'selected':''}>${{low:'Low — Thấp',medium:'Medium — Trung bình',high:'High — Cao',critical:'Critical — Khẩn cấp'}[p]}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">Tags</label><input class="fi2" id="ft-tg" value="${esc((task?.tags||[]).join(', '))}" placeholder="Frontend, Nghiên cứu, ..."></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">Ngày bắt đầu</label><input class="fi2" type="date" id="ft-s" value="${task?.start||new Date().toISOString().split('T')[0]}"></div>
      <div class="fg"><label class="fl">Deadline</label><input class="fi2" type="date" id="ft-dl" value="${task?.deadline||''}"></div>
    </div>
    ${assigneeSection}
    <div class="fg"><label class="fl">Subtask <span style="font-weight:400;text-transform:none;font-size:10px">(mỗi dòng 1 việc)</span></label><textarea class="fi2" id="ft-sb" placeholder="Bước 1&#10;Bước 2" style="height:64px">${(task?.subs||[]).map(s=>esc(s.t)).join('\n')}</textarea></div>

function saveTask(editId){
  const title=document.getElementById('ft-t').value.trim();
  if(!title){document.getElementById('ft-err').textContent='Vui lòng nhập tiêu đề.';return;}
  const isMember=S.cur.role==='member';
  // Member tự gán mình; Admin/Manager dùng checkbox
  const aIds=isMember
    ?[S.cur.id]
    :[...document.querySelectorAll('#mroot input[type=checkbox]:checked')].map(x=>x.value);
  const dl=document.getElementById('ft-dl').value;
  const startV=document.getElementById('ft-s').value;
  const tagsV=document.getElementById('ft-tg').value.split(',').map(x=>x.trim()).filter(Boolean);
  if(editId){
    const task=S.tasks.find(t=>t.id===editId);
    if(!task)return;
    const oldSubMap={};(task.subs||[]).forEach(s=>{oldSubMap[s.t]=s.d;});
    const subs=document.getElementById('ft-sb').value.split('\n').filter(s=>s.trim())
      .map(s=>({t:s.trim(),d:oldSubMap[s.trim()]||false}));
    task.title=title;task.desc=document.getElementById('ft-d').value;task.priority=document.getElementById('ft-p').value;
    task.deadline=dl;task.start=startV;task.tags=tagsV;task.subs=subs;
    // Member không thay đổi assignees của task được giao cho mình
    if(!isMember)S.asn[editId]=aIds;
    if(!S.logs[editId])S.logs[editId]=[];
    S.logs[editId].push({i:'✎',t:`${S.cur.full_name} chỉnh sửa task`,ts:new Date().toLocaleTimeString('vi-VN')});
    pushN(`Task "${title}" đã cập nhật`,editId);
  } else {
    const subs=document.getElementById('ft-sb').value.split('\n').filter(s=>s.trim()).map(s=>({t:s.trim(),d:false}));
    const id='t'+Date.now();
    S.tasks.unshift({
      id,title,
      desc:document.getElementById('ft-d').value,
      priority:document.getElementById('ft-p').value,
      status:'todo',
      creator:S.cur.id,
      selfCreated:isMember,  // true nếu member tự tạo
      start:startV,deadline:dl,tags:tagsV,subs,
      created:new Date().toISOString().split('T')[0]
    });
    S.asn[id]=aIds;S.cmts[id]=[];
    const logMsg=isMember
      ?`${S.cur.full_name} tự tạo task`
      :`${S.cur.full_name} tạo task`;
    S.logs[id]=[{i:'✦',t:logMsg,ts:new Date().toLocaleTimeString('vi-VN')}];
    if(!isMember){
      aIds.forEach(uid=>{const u=uby(uid);if(u&&uid!==S.cur.id)pushN(`${u.full_name} được giao: "${title}"`,id);});
    }
    pushN(`Tạo task: "${title}"`,id);
  }
  save();closeModal();rp(S.page);
  showToast(editId?'Đã lưu thay đổi task!':'Đã tạo task mới!','green');
}

function openEditTask(id){
  const task=S.tasks.find(t=>t.id===id);if(!task)return;
  closeModal();
  if(task.parentId){setTimeout(()=>openCreateSubtask(task.parentId,id),50);}
  else{setTimeout(()=>openCreateTask(id),50);}
}

function saveSubtask(parentId,editSubId){
  const title=document.getElementById('st-t').value.trim();
  if(!title){document.getElementById('st-err').textContent='Vui lòng nhập tiêu đề.';return;}
  const isMember=S.cur.role==='member';
  const aIds=isMember
    ?[S.cur.id]
    :[...document.querySelectorAll('#mroot input[type=checkbox]:checked')].map(x=>x.value);
  const subs=document.getElementById('st-sb').value.split('\n').filter(s=>s.trim()).map(s=>({t:s.trim(),d:false}));
  const dl=document.getElementById('st-dl').value;
  const startV=document.getElementById('st-s').value;
  const tagsV=document.getElementById('st-tg').value.split(',').map(x=>x.trim()).filter(Boolean);

  if(editSubId){
    const sub=S.tasks.find(t=>t.id===editSubId);if(!sub)return;
    const oldSubMap={};(sub.subs||[]).forEach(s=>{oldSubMap[s.t]=s.d;});
    const mergedSubs=subs.map(s=>({t:s.t,d:oldSubMap[s.t]||false}));
    sub.title=title;sub.desc=document.getElementById('st-d').value;
    sub.priority=document.getElementById('st-p').value;
    sub.deadline=dl;sub.start=startV;sub.tags=tagsV;sub.subs=mergedSubs;
    if(!isMember)S.asn[editSubId]=aIds;
    if(!S.logs[editSubId])S.logs[editSubId]=[];
    S.logs[editSubId].push({i:'✎',t:`${S.cur.full_name} sửa subtask`,ts:new Date().toLocaleTimeString('vi-VN')});
  } else {
    const id='s'+Date.now();
    S.tasks.push({
      id,title,
      desc:document.getElementById('st-d').value,
      priority:document.getElementById('st-p').value,
      status:'todo',
      creator:S.cur.id,
      parentId,           // ← liên kết với task cha
      start:startV,deadline:dl,tags:tagsV,subs,
      created:new Date().toISOString().split('T')[0]
    });
    S.asn[id]=aIds.length?aIds:(S.asn[parentId]||[]);
    S.cmts[id]=[];
    S.logs[id]=[{i:'◈',t:`${S.cur.full_name} tạo subtask cho: ${S.tasks.find(t=>t.id===parentId)?.title||''}`,ts:new Date().toLocaleTimeString('vi-VN')}];
    if(!S.logs[parentId])S.logs[parentId]=[];
    S.logs[parentId].push({i:'◈',t:`Thêm subtask: "${title}"`,ts:new Date().toLocaleTimeString('vi-VN')});
    pushN(`Subtask mới: "${title}"`,id);
  }
  save();
  closeModal();
  setTimeout(()=>openTask(parentId),50);
  showToast(editSubId?'Đã cập nhật subtask!':'Đã tạo subtask!','green');
}

function markRead(id){
  const n=S.notifs.find(x=>x.id===id);if(n)n.read=true;

  document.getElementById('nbdot').style.display=u?'block':'none';

function markAllRead(){
  S.notifs.forEach(n=>n.read=true);

// ═══════════════════════════════════════════════
// BÁO CÁO TỔNG KẾT
// ═══════════════════════════════════════════════
function rReports(){
  const period = S.reportPeriod||'month';
  const now = new Date();

  // Tính khoảng thời gian
  let pStart, pEnd, pLabel;
  if(period==='month'){
    pStart=new Date(now.getFullYear(),now.getMonth(),1);
    pEnd=new Date(now.getFullYear(),now.getMonth()+1,0);
    pLabel=`Tháng ${now.getMonth()+1}/${now.getFullYear()}`;
  } else if(period==='quarter'){
    const q=Math.floor(now.getMonth()/3);
    pStart=new Date(now.getFullYear(),q*3,1);
    pEnd=new Date(now.getFullYear(),q*3+3,0);
    pLabel=`Quý ${q+1}/${now.getFullYear()}`;
  } else {
    pStart=new Date(now.getFullYear(),0,1);
    pEnd=new Date(now.getFullYear(),11,31);
    pLabel=`Năm ${now.getFullYear()}`;
  }

  const inPeriod = t => {
    const d = new Date(t.created);
    return d>=pStart && d<=pEnd;
  };

  // Dataset trong kỳ
  const allTasks = S.tasks.filter(inPeriod);
  const doneTasks = allTasks.filter(t=>t.status==='done');
  const cancelTasks = allTasks.filter(t=>t.status==='cancelled');
  const activeTasks = allTasks.filter(t=>t.status!=='done'&&t.status!=='cancelled');
  const overdueTasks = allTasks.filter(t=>t.status!=='done'&&t.status!=='cancelled'&&t.deadline&&new Date(t.deadline)<now);
  const onTimeDone = doneTasks.filter(t=>!t.deadline||new Date(t.deadline)>=new Date(t.created+'T23:59:59'));
  const lateFinish = doneTasks.filter(t=>t.deadline&&new Date(t.deadline)<new Date(t.created+'T23:59:59'));

  const total=allTasks.length;
  const doneRate=total?Math.round(doneTasks.length/total*100):0;
  const onTimeRate=doneTasks.length?Math.round(onTimeDone.length/doneTasks.length*100):0;
  const cancelRate=total?Math.round(cancelTasks.length/total*100):0;

  // Phân loại theo ưu tiên
  const byPriority = {critical:0,high:0,medium:0,low:0};
  allTasks.forEach(t=>{byPriority[t.priority]=(byPriority[t.priority]||0)+1;});

  // Sao chất lượng (0-5) dựa trên onTimeRate
  const qualityStars = onTimeRate>=90?5:onTimeRate>=75?4:onTimeRate>=60?3:onTimeRate>=40?2:1;
  const starHtml = n=>[...Array(5)].map((_,i)=>`<span class="${i<n?'star':'star-e'}">★</span>`).join('');

  // Hiệu suất từng nhân sự
  const wu = S.users.filter(u=>u.role!=='admin');
  const memberStats = wu.map(u=>{
    const mt=allTasks.filter(t=>(S.asn[t.id]||[]).includes(u.id));
    const mdone=mt.filter(t=>t.status==='done');
    const mover=mt.filter(t=>t.status!=='done'&&t.status!=='cancelled'&&t.deadline&&new Date(t.deadline)<now);
    const montime=mdone.filter(t=>!t.deadline||new Date(t.deadline)>=new Date(t.created+'T23:59:59'));
    const rate=mt.length?Math.round(mdone.length/mt.length*100):0;
    const otrate=mdone.length?Math.round(montime.length/mdone.length*100):100;
    return{u,total:mt.length,done:mdone.length,over:mover.length,rate,otrate};
  }).sort((a,b)=>b.rate-a.rate);

  // Xu hướng theo tuần/tháng trong kỳ
  const buildTrend = ()=>{
    if(period==='month'){
      const weeks=['T1','T2','T3','T4'];
      return weeks.map((w,i)=>{
        const ws=new Date(pStart); ws.setDate(1+i*7);
        const we=new Date(pStart); we.setDate(Math.min(7+i*7,pEnd.getDate()));
        const cnt=doneTasks.filter(t=>{const d=new Date(t.created);return d>=ws&&d<=we;}).length;
        return{l:w,v:cnt};
      });
    } else if(period==='quarter'){
      const months=[];
      for(let m=pStart.getMonth();m<=pEnd.getMonth();m++){
        const ms=new Date(now.getFullYear(),m,1);
        const me=new Date(now.getFullYear(),m+1,0);
        const cnt=doneTasks.filter(t=>{const d=new Date(t.created);return d>=ms&&d<=me;}).length;
        months.push({l:`T${m+1}`,v:cnt});
      }
      return months;
    } else {
      return [...Array(12)].map((_,m)=>{
        const ms=new Date(now.getFullYear(),m,1);
        const me=new Date(now.getFullYear(),m+1,0);
        const cnt=doneTasks.filter(t=>{const d=new Date(t.created);return d>=ms&&d<=me;}).length;
        return{l:`T${m+1}`,v:cnt};
      });
    }
  };
  const trend=buildTrend();
  const trendMax=Math.max(1,...trend.map(t=>t.v));
  const trendHtml=trend.map(t=>`
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
      <div style="font-size:10px;color:var(--tx3);font-family:var(--mono)">${t.v||''}</div>
      <div style="width:100%;background:var(--s3);border-radius:3px;overflow:hidden;height:60px;display:flex;align-items:flex-end">
        <div style="width:100%;background:var(--acc);border-radius:3px 3px 0 0;height:${Math.round(t.v/trendMax*100)}%;transition:height .4s;min-height:${t.v>0?'4px':'0'}"></div>
      </div>
      <div style="font-size:9px;color:var(--tx3)">${t.l}</div>
    </div>`).join('');

  // Nhận xét tự động
  const autoComment = ()=>{
    const lines=[];
    if(total===0)return'Không có task nào trong kỳ này.';
    lines.push(`Kỳ ${pLabel} ghi nhận <b>${total} task</b> được tạo mới.`);
    if(doneRate>=80) lines.push(`Tỉ lệ hoàn thành <b style="color:var(--green)">${doneRate}%</b> — xuất sắc.`);
    else if(doneRate>=60) lines.push(`Tỉ lệ hoàn thành <b style="color:var(--amber)">${doneRate}%</b> — cần cải thiện.`);
    else lines.push(`Tỉ lệ hoàn thành <b style="color:var(--red)">${doneRate}%</b> — thấp, cần xem xét nguyên nhân.`);
    if(onTimeRate>=80) lines.push(`Đúng hạn <b style="color:var(--green)">${onTimeRate}%</b> task — tiến độ tốt.`);
    else if(onTimeRate>=60) lines.push(`Chỉ <b style="color:var(--amber)">${onTimeRate}%</b> hoàn thành đúng hạn — cần tăng cường giám sát.`);
    else lines.push(`Tỉ lệ đúng hạn <b style="color:var(--red)">${onTimeRate}%</b> — nghiêm trọng, cần họp kiểm điểm.`);
    if(overdueTasks.length>0) lines.push(`Hiện còn <b style="color:var(--red)">${overdueTasks.length} task quá hạn</b> chưa xử lý.`);
    const topMember=memberStats[0];
    if(topMember&&topMember.done>0) lines.push(`Nhân sự nổi bật: <b>${esc(topMember.u.full_name)}</b> hoàn thành ${topMember.done}/${topMember.total} task (${topMember.rate}%).`);
    return lines.join(' ');
  };

  return`
  <div class="sh">
    <div>
      <div style="font-size:18px;font-weight:700">Báo cáo tổng kết</div>
      <div style="font-size:12px;color:var(--tx2);margin-top:2px">${pLabel}</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="exportReportExcel()" style="gap:5px">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M4.406 1.342A5.53 5.53 0 0 1 8 0c2.69 0 4.923 2 5.166 4.579C14.758 4.804 16 6.137 16 7.773 16 9.569 14.502 11 12.687 11H10a.5.5 0 0 1 0-1h2.688C13.979 10 15 8.988 15 7.773c0-1.216-1.02-2.228-2.313-2.228h-.5v-.5C12.188 2.825 10.328 1 8 1a4.53 4.53 0 0 0-2.941 1.1c-.757.652-1.153 1.438-1.153 2.055v.448l-.445.049C2.064 4.805 1 5.952 1 7.318 1 8.785 2.23 10 3.781 10H6a.5.5 0 0 1 0 1H3.781C1.708 11 0 9.366 0 7.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383z"/><path d="M7.646 15.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 14.293V5.5a.5.5 0 0 0-1 0v8.793l-2.146-2.147a.5.5 0 0 0-.708.708l3 3z"/></svg>
        Xuất Excel
      </button>
      <button class="btn" onclick="printReport()" style="gap:5px">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M2.5 8a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1z"/><path d="M5 1a2 2 0 0 0-2 2v2H2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1v1a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1h1a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-1V3a2 2 0 0 0-2-2H5zM4 3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2H4V3zm1 5a2 2 0 0 0-2 2v1H2a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v-1a2 2 0 0 0-2-2H5zm7 2v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1z"/></svg>
        In báo cáo
      </button>
    </div>
  </div>

  <!-- Chọn kỳ -->
  <div class="rpt-period">
    ${['month','quarter','year'].map(p=>`<div class="fi3 ${(S.reportPeriod||'month')===p?'on':''}" onclick="S.reportPeriod='${p}';rp('reports')">${{month:'Tháng này',quarter:'Quý này',year:'Năm này'}[p]}</div>`).join('')}
  </div>

  <!-- NHẬN XÉT TỰ ĐỘNG -->
  <div class="rpt-sum">
    <div class="rpt-sum-title">Tóm tắt tự động — ${pLabel}</div>
    <div class="rpt-sum-text">${autoComment()}</div>
  </div>

  <!-- TIÊU CHÍ 1: SỐ LƯỢNG -->
  <div class="rpt-block">
    <div class="rpt-block-title">
      <div class="rpt-ico" style="background:var(--acc)">1</div>
      Số lượng công việc
    </div>
    <div class="rpt-kpi">
      <div class="rpt-kpi-item"><div class="rpt-kpi-val" style="color:var(--acc)">${total}</div><div class="rpt-kpi-lbl">Tổng task tạo mới</div><div class="rpt-kpi-sub">trong ${pLabel}</div></div>
      <div class="rpt-kpi-item"><div class="rpt-kpi-val" style="color:var(--green)">${doneTasks.length}</div><div class="rpt-kpi-lbl">Đã hoàn thành</div><div class="rpt-kpi-sub">${doneRate}% tỉ lệ</div></div>
      <div class="rpt-kpi-item"><div class="rpt-kpi-val" style="color:var(--amber)">${activeTasks.length}</div><div class="rpt-kpi-lbl">Đang xử lý</div><div class="rpt-kpi-sub">chưa kết thúc</div></div>
      <div class="rpt-kpi-item"><div class="rpt-kpi-val" style="color:var(--red)">${overdueTasks.length}</div><div class="rpt-kpi-lbl">Quá hạn</div><div class="rpt-kpi-sub">cần xử lý ngay</div></div>
      <div class="rpt-kpi-item"><div class="rpt-kpi-val" style="color:var(--tx2)">${cancelTasks.length}</div><div class="rpt-kpi-lbl">Đã huỷ</div><div class="rpt-kpi-sub">${cancelRate}% tỉ lệ</div></div>
    </div>
    <!-- Phân loại theo ưu tiên -->
    <div style="font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px">Phân loại theo độ ưu tiên</div>
    ${['critical','high','medium','low'].map(p=>{
      const cnt=byPriority[p]||0;
      const pct=total?Math.round(cnt/total*100):0;
      const col={critical:'var(--red)',high:'var(--amber)',medium:'var(--acc)',low:'var(--green)'}[p];
      return`<div class="rpt-bar-row">
        <div class="rpt-bar-lbl">${{critical:'Critical',high:'High',medium:'Medium',low:'Low'}[p]}</div>
        <div class="rpt-bar-track"><div class="rpt-bar-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="rpt-bar-val">${cnt}</div>
      </div>`;
    }).join('')}
    <!-- Xu hướng hoàn thành -->
    <div style="font-size:11px;font-weight:700;color:var(--tx2);margin-top:14px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">Xu hướng hoàn thành</div>
    <div style="display:flex;gap:6px;align-items:flex-end;height:90px;padding:0 4px">${trendHtml}</div>
  </div>

  <!-- TIÊU CHÍ 2: CHẤT LƯỢNG -->
  <div class="rpt-block">
    <div class="rpt-block-title">
      <div class="rpt-ico" style="background:var(--amber)">2</div>
      Chất lượng công việc
    </div>
    <div class="rpt-kpi">
      <div class="rpt-kpi-item">
        <div style="display:flex;justify-content:center;margin-bottom:4px">${starHtml(qualityStars)}</div>
        <div class="rpt-kpi-lbl">Chỉ số chất lượng</div>
        <div class="rpt-kpi-sub">${qualityStars}/5 sao</div>
      </div>
      <div class="rpt-kpi-item"><div class="rpt-kpi-val" style="color:var(--green)">${onTimeRate}%</div><div class="rpt-kpi-lbl">Đúng deadline</div><div class="rpt-kpi-sub">${onTimeDone.length} task</div></div>
      <div class="rpt-kpi-item"><div class="rpt-kpi-val" style="color:var(--red)">${doneTasks.length?Math.round(lateFinish.length/doneTasks.length*100):0}%</div><div class="rpt-kpi-lbl">Trễ deadline</div><div class="rpt-kpi-sub">${lateFinish.length} task</div></div>
      <div class="rpt-kpi-item"><div class="rpt-kpi-val" style="color:var(--purple)">${total?Math.round(allTasks.filter(t=>(S.cmts[t.id]||[]).length>0).length/total*100):0}%</div><div class="rpt-kpi-lbl">Có ghi chú</div><div class="rpt-kpi-sub">task có comment</div></div>
    </div>
    <!-- Đánh giá chất lượng từng nhân sự -->
    <div style="font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">Chất lượng theo nhân sự</div>
    <table class="rpt-tbl">
      <thead><tr><th>Nhân sự</th><th>Hoàn thành</th><th>Đúng hạn</th><th>Chỉ số</th><th>Xếp loại</th></tr></thead>
      <tbody>
      ${memberStats.map(m=>{
        const stars=m.otrate>=90?5:m.otrate>=75?4:m.otrate>=60?3:m.otrate>=40?2:1;
        const grade=m.otrate>=90?['Xuất sắc','var(--green)']:m.otrate>=75?['Tốt','var(--acc)']:m.otrate>=60?['Khá','var(--amber)']:m.otrate>=40?['Trung bình','var(--amber)']:['Cần cải thiện','var(--red)'];
        return`<tr>
          <td><div style="display:flex;align-items:center;gap:7px">${avH(m.u,'av av20')}<span style="font-size:11px;font-weight:500">${esc(m.u.full_name)}</span></div></td>
          <td><span style="font-family:var(--mono);color:var(--green)">${m.done}</span><span style="color:var(--tx3)">/${m.total}</span></td>
          <td><span style="font-family:var(--mono);color:${m.otrate>=70?'var(--green)':'var(--red)'}">${m.otrate}%</span></td>
          <td><div style="display:flex;gap:1px">${starHtml(stars)}</div></td>
          <td><span style="font-size:10px;font-weight:700;color:${grade[1]}">${grade[0]}</span></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
  </div>

  <!-- TIÊU CHÍ 3: TIẾN ĐỘ -->
  <div class="rpt-block">
    <div class="rpt-block-title">
      <div class="rpt-ico" style="background:var(--green)">3</div>
      Tiến độ công việc
    </div>
    <div class="rpt-kpi">
      <div class="rpt-kpi-item"><div class="rpt-kpi-val" style="color:var(--acc)">${doneRate}%</div><div class="rpt-kpi-lbl">Tỉ lệ hoàn thành</div></div>
      <div class="rpt-kpi-item"><div class="rpt-kpi-val" style="color:var(--green)">${onTimeRate}%</div><div class="rpt-kpi-lbl">Đúng tiến độ</div></div>
      <div class="rpt-kpi-item"><div class="rpt-kpi-val" style="color:var(--red)">${overdueTasks.length}</div><div class="rpt-kpi-lbl">Task tồn đọng</div></div>
    </div>
    <!-- Tiến độ theo nhân sự -->
    <div style="font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">Tiến độ từng nhân sự</div>
    ${memberStats.map(m=>`
      <div class="rpt-bar-row">
        <div class="rpt-bar-lbl" style="display:flex;align-items:center;gap:6px">${avH(m.u,'av av20')} ${esc(m.u.full_name.split(' ').slice(-1)[0])}</div>
        <div class="rpt-bar-track"><div class="rpt-bar-fill" style="width:${m.rate}%;background:${m.rate>=80?'var(--green)':m.rate>=50?'var(--acc)':'var(--red)'}"></div></div>
        <div class="rpt-bar-val">${m.rate}%</div>
        ${m.over>0?`<span style="font-size:10px;color:var(--red)">⚡${m.over} trễ</span>`:'<span style="font-size:10px;color:var(--green)">✓</span>'}
      </div>`).join('')}
    <!-- Bảng chi tiết task trễ -->
    ${overdueTasks.length?`
    <div style="font-size:11px;font-weight:700;color:var(--red);margin-top:14px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">
      Task quá hạn cần xử lý (${overdueTasks.length})
    </div>
    <table class="rpt-tbl">
      <thead><tr><th>Task</th><th>Ưu tiên</th><th>Deadline</th><th>Người thực hiện</th><th>Trễ</th></tr></thead>
      <tbody>
      ${overdueTasks.slice(0,10).map(t=>{
        const diff=Math.abs(Math.ceil((new Date(t.deadline)-now)/86400000));
        const aIds=(S.asn[t.id]||[]);
        const names=aIds.map(id=>uby(id)?.full_name?.split(' ').slice(-1)[0]||'?').join(', ');
        return`<tr onclick="openTask('${esc(t.id)}')" style="cursor:pointer">
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title)}</td>
          <td>${pb(t.priority)}</td>
          <td style="color:var(--red)">${fd(t.deadline)}</td>
          <td style="font-size:10px">${esc(names)||'—'}</td>
          <td><span style="color:var(--red);font-weight:700;font-family:var(--mono)">${diff}n</span></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`:'<div style="color:var(--green);font-size:12px;margin-top:12px;text-align:center">Không có task quá hạn trong kỳ này ✓</div>'}
  </div>`;
}

function exportReportExcel(){
  const now=new Date();
  const period=S.reportPeriod||'month';
  const pLabel={month:`Tháng ${now.getMonth()+1}_${now.getFullYear()}`,quarter:`Quy${Math.floor(now.getMonth()/3)+1}_${now.getFullYear()}`,year:`Nam_${now.getFullYear()}`}[period];
  const pLabelFull={month:`Tháng ${now.getMonth()+1}/${now.getFullYear()}`,quarter:`Quý ${Math.floor(now.getMonth()/3)+1}/${now.getFullYear()}`,year:`Năm ${now.getFullYear()}`}[period];

  // Tính khoảng thời gian
  let pStart,pEnd;
  if(period==='month'){pStart=new Date(now.getFullYear(),now.getMonth(),1);pEnd=new Date(now.getFullYear(),now.getMonth()+1,0);}
  else if(period==='quarter'){const q=Math.floor(now.getMonth()/3);pStart=new Date(now.getFullYear(),q*3,1);pEnd=new Date(now.getFullYear(),q*3+3,0);}
  else{pStart=new Date(now.getFullYear(),0,1);pEnd=new Date(now.getFullYear(),11,31);}
  const inPeriod=t=>{const d=new Date(t.created);return d>=pStart&&d<=pEnd;};

  const allTasks=S.tasks.filter(inPeriod);
  const doneTasks=allTasks.filter(t=>t.status==='done');
  const overdueTasks=allTasks.filter(t=>t.status!=='done'&&t.status!=='cancelled'&&t.deadline&&new Date(t.deadline)<now);
  const onTimeDone=doneTasks.filter(t=>!t.deadline||new Date(t.deadline)>=new Date(t.created+'T23:59:59'));
  const doneRate=allTasks.length?Math.round(doneTasks.length/allTasks.length*100):0;
  const onTimeRate=doneTasks.length?Math.round(onTimeDone.length/doneTasks.length*100):0;

  // Build member stats
  const wu=S.users.filter(u=>u.role!=='admin');
  const memberStats=wu.map(u=>{
    const mt=allTasks.filter(t=>(S.asn[t.id]||[]).includes(u.id));
    const mdone=mt.filter(t=>t.status==='done');
    const mover=mt.filter(t=>t.status!=='done'&&t.status!=='cancelled'&&t.deadline&&new Date(t.deadline)<now);
    const montime=mdone.filter(t=>!t.deadline||new Date(t.deadline)>=new Date(t.created+'T23:59:59'));
    const rate=mt.length?Math.round(mdone.length/mt.length*100):0;
    const otrate=mdone.length?Math.round(montime.length/mdone.length*100):100;
    const grade=otrate>=90?'Xuất sắc':otrate>=75?'Tốt':otrate>=60?'Khá':otrate>=40?'Trung bình':'Cần cải thiện';
    return{name:u.full_name,role:{manager:'Quản lý',member:'Thành viên'}[u.role]||u.role,total:mt.length,done:mdone.length,over:mover.length,rate,otrate,grade};
  });

  // ── Tạo HTML table → Excel via data URI ──
  const styles=`<style>
    body{font-family:Arial,sans-serif;font-size:11px}
    h1{font-size:16px;color:#1d4ed8;margin:0 0 4px}
    h2{font-size:13px;color:#374151;font-weight:600;margin:20px 0 6px;border-bottom:2px solid #1d4ed8;padding-bottom:4px}
    h3{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 5px}
    table{width:100%;border-collapse:collapse;margin-bottom:12px}
    th{background:#1d4ed8;color:#fff;padding:6px 10px;font-size:10px;text-align:left;white-space:nowrap}
    td{padding:5px 10px;border-bottom:1px solid #e5e7eb;font-size:11px}
    tr:nth-child(even) td{background:#f8fafc}
    .kpi-table td{text-align:center;font-weight:700;font-size:14px;padding:10px}
    .kpi-table td.lbl{font-size:10px;color:#6b7280;font-weight:400;padding:0 10px 8px}
    .red{color:#dc2626}.green{color:#16a34a}.amber{color:#d97706}.blue{color:#2563eb}
    .sep{margin:24px 0 0}
  </style>`;

  // Sheet 1 — Tổng quan
  const overviewRows=`
    <tr><th colspan="2" style="background:#1e40af;font-size:12px">Chỉ số tổng quan — ${pLabelFull}</th></tr>
    <tr><td>Tổng task được tạo</td><td class="blue">${allTasks.length}</td></tr>
    <tr><td>Task hoàn thành</td><td class="green">${doneTasks.length}</td></tr>
    <tr><td>Tỉ lệ hoàn thành</td><td class="${doneRate>=80?'green':doneRate>=60?'amber':'red'}">${doneRate}%</td></tr>
    <tr><td>Task đang xử lý</td><td>${allTasks.filter(t=>t.status==='inprogress').length}</td></tr>
    <tr><td>Task chờ review</td><td>${allTasks.filter(t=>t.status==='inreview').length}</td></tr>
    <tr><td>Task quá hạn</td><td class="red">${overdueTasks.length}</td></tr>
    <tr><td>Task đã huỷ</td><td>${allTasks.filter(t=>t.status==='cancelled').length}</td></tr>
    <tr><td>Đúng deadline</td><td class="${onTimeRate>=80?'green':onTimeRate>=60?'amber':'red'}">${onTimeRate}%</td></tr>
    <tr><td>Trễ deadline</td><td class="red">${doneTasks.length?Math.round((doneTasks.length-onTimeDone.length)/doneTasks.length*100):0}%</td></tr>`;

  // Priority breakdown
  const byP={critical:0,high:0,medium:0,low:0};
  allTasks.forEach(t=>{byP[t.priority]=(byP[t.priority]||0)+1;});
  const priorityRows=`
    <tr><td>Critical</td><td class="red">${byP.critical}</td></tr>
    <tr><td>High</td><td class="amber">${byP.high}</td></tr>
    <tr><td>Medium</td><td class="blue">${byP.medium}</td></tr>
    <tr><td>Low</td><td class="green">${byP.low}</td></tr>`;

  // Member performance rows
  const memberRows=memberStats.map(m=>`
    <tr><td>${m.name}</td><td>${m.role}</td><td>${m.total}</td><td class="green">${m.done}</td>
    <td class="${m.over>0?'red':''}">${m.over}</td>
    <td class="${m.rate>=80?'green':m.rate>=60?'amber':'red'}">${m.rate}%</td>
    <td class="${m.otrate>=80?'green':m.otrate>=60?'amber':'red'}">${m.otrate}%</td>
    <td>${m.grade}</td></tr>`).join('');

  // All tasks in period
  const taskRows=allTasks.map(t=>{
    const aIds=S.asn[t.id]||[];
    const names=aIds.map(id=>uby(id)?.full_name||'?').join(', ');
    const creator=uby(t.creator)?.full_name||'?';
    const source=t.selfCreated?'Tự tạo':'Được giao';
    const statusLabel={todo:'Todo',inprogress:'In Progress',inreview:'In Review',done:'Hoàn thành',cancelled:'Đã huỷ'}[t.status]||t.status;
    const priorityLabel={critical:'Critical',high:'High',medium:'Medium',low:'Low'}[t.priority]||t.priority;
    return`<tr>
      <td>${t.title}</td><td>${priorityLabel}</td><td>${statusLabel}</td>
      <td>${source}</td><td>${creator}</td><td>${names}</td>
      <td>${fd(t.start)}</td><td>${fd(t.deadline)}</td><td>${fd(t.created)}</td>
    </tr>`;
  }).join('');

  const html=`<!DOCTYPE html><html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
  <head><meta charset="UTF-8">${styles}
  <xml><x:ExcelWorkbook><x:ExcelWorksheets>
    <x:ExcelWorksheet><x:Name>Tổng quan</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>
  </x:ExcelWorksheets></x:ExcelWorkbook></xml>
  </head><body>
  <h1>WP_Quản lý công việc</h1>
  <p style="color:#6b7280;font-size:11px">Báo cáo tổng kết ${pLabelFull} · Xuất lúc ${now.toLocaleString('vi-VN')}</p>

  <h2>1. Tổng quan số lượng & chất lượng</h2>
  <table><tbody>${overviewRows}</tbody></table>

  <h3>Phân loại theo độ ưu tiên</h3>
  <table><thead><tr><th>Mức ưu tiên</th><th>Số lượng</th></tr></thead><tbody>${priorityRows}</tbody></table>

  <h2>2. Hiệu suất nhân sự</h2>
  <table><thead><tr><th>Họ tên</th><th>Vai trò</th><th>Tổng task</th><th>Hoàn thành</th><th>Quá hạn</th><th>Tỉ lệ HT</th><th>Đúng hạn</th><th>Xếp loại</th></tr></thead>
  <tbody>${memberRows}</tbody></table>

  <h2>3. Danh sách chi tiết task trong kỳ</h2>
  <table><thead><tr><th>Tiêu đề</th><th>Ưu tiên</th><th>Trạng thái</th><th>Nguồn</th><th>Người tạo</th><th>Người thực hiện</th><th>Bắt đầu</th><th>Deadline</th><th>Ngày tạo</th></tr></thead>
  <tbody>${taskRows}</tbody></table>

  </body></html>`;

  const blob=new Blob(['\ufeff'+html],{type:'application/vnd.ms-excel;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`WP_BaoCao_${pLabel}_${now.toISOString().split('T')[0]}.xls`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`Đã xuất Excel: WP_BaoCao_${pLabel}.xls`,'green');
}

// KANBAN COLLAPSE — toggle DOM trực tiếp, không re-render
// ═══════════════════════════════════════════════
function toggleKbCollapse(parentId){
  S.kbCollapsed[parentId]=!S.kbCollapsed[parentId];
  const collapsed=S.kbCollapsed[parentId];

  // Toggle subtask group trong tất cả cột (subtask có thể nằm ở cột khác)
  document.querySelectorAll(`#kb-sg-${CSS.escape(parentId)}`).forEach(el=>{
    el.classList.toggle('kb-hidden',collapsed);
  });

  // Cập nhật icon nút collapse trên card task cha
  // (nút nằm trong .tcm → span → button)
  document.querySelectorAll('.tcard').forEach(card=>{
    // Card có onclick chứa parentId
    if(card.getAttribute('onclick')?.includes(parentId)){
      const btn=card.querySelector('.kb-collapse-btn');
      if(btn)btn.textContent=collapsed?'▶':'▼';
    }
  });
}

function collapseAllKb(collapse){
  const parents=S.tasks.filter(t=>!t.parentId&&S.tasks.some(s=>s.parentId===t.id));
  parents.forEach(t=>{S.kbCollapsed[t.id]=collapse;});
  // Toggle tất cả group + icon
  document.querySelectorAll('.kb-sub-group').forEach(el=>el.classList.toggle('kb-hidden',collapse));
  document.querySelectorAll('.kb-collapse-btn').forEach(btn=>{btn.textContent=collapse?'▶':'▼';});
}

// ═══════════════════════════════════════════════
// BẢNG TASK COLLAPSE — toggle <tr> trực tiếp
// ═══════════════════════════════════════════════
function toggleTblCollapse(parentId){
  S.tblCollapsed[parentId]=!S.tblCollapsed[parentId];
  const collapsed=S.tblCollapsed[parentId];

  // Ẩn/hiện các hàng subtask có data-parent = parentId
  document.querySelectorAll(`.tbl-sub-row[data-parent="${CSS.escape(parentId)}"]`).forEach(tr=>{
    tr.classList.toggle('tbl-hidden',collapsed);
  });

  // Cập nhật icon nút trên hàng task cha
  const parentRow=document.getElementById(`tbl-parent-${parentId}`);
  if(parentRow){
    const btn=parentRow.querySelector('.kb-collapse-btn');
    if(btn)btn.textContent=collapsed?'▶':'▼';
  }
}

function collapseAllTbl(collapse){
  const parents=S.tasks.filter(t=>!t.parentId&&S.tasks.some(s=>s.parentId===t.id));
  parents.forEach(t=>{S.tblCollapsed[t.id]=collapse;});
  document.querySelectorAll('.tbl-sub-row').forEach(tr=>tr.classList.toggle('tbl-hidden',collapse));
  document.querySelectorAll('#pg-tasks .kb-collapse-btn').forEach(btn=>{btn.textContent=collapse?'▶':'▼';});
}

// ═══════════════════════════════════════════════
// KANBAN DRAG & DROP + QUICK STATUS
// ═══════════════════════════════════════════════
let _dragId=null;

function kbDragStart(e,id){
  _dragId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
  requestAnimationFrame(()=>{if(e.currentTarget)e.currentTarget.classList.add('dragging');});
}

function kbDragEnd(e){
  _dragId=null;
  document.querySelectorAll('.tcard.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.kc.drag-over').forEach(el=>el.classList.remove('drag-over'));
}

function kbDragOver(e,colKey){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const col=document.getElementById('kc-'+colKey);
  if(col&&!col.classList.contains('drag-over'))col.classList.add('drag-over');
}

function kbDragLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove('drag-over');
}

function kbDrop(e,colKey){
  e.preventDefault();
  const id=e.dataTransfer.getData('text/plain')||_dragId;
  if(!id)return;
  e.currentTarget.classList.remove('drag-over');
  const task=S.tasks.find(t=>t.id===id);
  if(!task||task.status===colKey)return;
  const canChange=S.cur.role!=='member'||(S.asn[id]||[]).includes(S.cur.id)||task.creator===S.cur.id;
  if(!canChange){showToast('Bạn không có quyền đổi trạng thái task này.','red');return;}
  kbChangeStatus(id,colKey);
}

function kbChangeStatus(id,ns){
  const task=S.tasks.find(t=>t.id===id);if(!task)return;
  const canChange=S.cur.role!=='member'||(S.asn[id]||[]).includes(S.cur.id)||task.creator===S.cur.id;
  if(!canChange){showToast('Bạn không có quyền đổi trạng thái task này.','red');return;}
  const lab={todo:'Todo',inprogress:'In Progress',inreview:'In Review',done:'Done'};
  if(task.status===ns)return;
  const old=task.status;task.status=ns;
  if(!S.logs[id])S.logs[id]=[];
  S.logs[id].push({i:'◆',t:`${lab[old]||old} → ${lab[ns]} bởi ${S.cur.full_name}`,ts:new Date().toLocaleTimeString('vi-VN')});
  pushN(`"${task.title}" → ${lab[ns]}`,id);
  save();closeQsMenu();
  rp(S.page);
  showToast(`"${task.title.slice(0,22)}${task.title.length>22?'…':''}" → ${lab[ns]}`,'blue');
}

// Quick Status Menu
let _qsMenuEl=null;
function openQsMenu(e,id,btn){
  e.stopPropagation();closeQsMenu();
  const task=S.tasks.find(t=>t.id===id);if(!task)return;
  const statuses=[
    {key:'todo',label:'Todo',col:'#6b7280'},
    {key:'inprogress',label:'In Progress',col:'var(--acc)'},
    {key:'inreview',label:'In Review',col:'var(--purple)'},
    {key:'done',label:'Done',col:'var(--green)'},
  ];
  const menu=document.createElement('div');
  menu.className='qs-menu';menu.id='qs-menu-active';
  const hdr=document.createElement('div');
  hdr.style.cssText='padding:5px 10px 8px;font-size:10px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bd);margin-bottom:4px';
  hdr.textContent='Chuyển sang';menu.appendChild(hdr);
  statuses.forEach(s=>{
    const item=document.createElement('div');
    const isActive=task.status===s.key;
    item.className='qs-item'+(isActive?' active':'');
    item.innerHTML=`<span class="qsdot" style="background:${s.col}"></span>${s.label}${isActive?' ✓':''}`;
    if(!isActive)item.addEventListener('click',ev=>{ev.stopPropagation();kbChangeStatus(id,s.key);});
    menu.appendChild(item);
  });
  document.body.appendChild(menu);_qsMenuEl=menu;
  const br=btn.getBoundingClientRect();
  const mw=menu.offsetWidth||165;const mh=menu.offsetHeight||160;
  let left=br.right-mw;let top=br.bottom+4;
  if(left<6)left=6;
  if(top+mh>window.innerHeight-8)top=br.top-mh-4;
  menu.style.left=left+'px';menu.style.top=top+'px';
  setTimeout(()=>{
    document.addEventListener('click',closeQsMenu,{once:true});
    document.addEventListener('keydown',ev=>{if(ev.key==='Escape')closeQsMenu();},{once:true});
  },10);
}
function closeQsMenu(){if(_qsMenuEl){_qsMenuEl.remove();_qsMenuEl=null;}}
</script>
