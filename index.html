<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP_Quản lý công việc</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}

/* ═══ THEME: DARK (default) ═══ */
[data-theme="dark"]{
  --bg:#0d1117;--s1:#161c25;--s2:#1c2333;--s3:#232d3f;
  --bd:#2a3547;--bd2:#3d4f6a;
  --tx:#dde3ef;--tx2:#7d8faa;--tx3:#3d4f6a;
  --acc:#4c8bf5;--acc-d:#1a3460;--acc-g:#4c8bf518;
  --green:#2cc97a;--green-d:#0a2e1a;
  --amber:#f0a220;--amber-d:#2d1e00;
  --red:#ef4444;--red-d:#2d0a0a;
  --purple:#9b7cf4;--purple-d:#1e1540;
  --tb-bg:#161c25;--tb-bd:#2a3547;
  --pc:#2e0a0a;--pct:#f87171;--ph:#2e1500;--pht:#fb923c;
  --pm:#2d1e00;--pmt:#f0a220;--pls:#0a2a15;--plt:#4ade80;
  --r:7px;--rl:11px;--rxl:16px;
  --ff:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;--mono:'Courier New',Courier,monospace;
}

/* ═══ THEME: LIGHT CLEAN ═══ */
[data-theme="light"]{
  --bg:#f0f2f5;--s1:#ffffff;--s2:#f5f7fa;--s3:#eaecf0;
  --bd:#dde1e7;--bd2:#c5cad4;
  --tx:#1a202c;--tx2:#64748b;--tx3:#a0aec0;
  --acc:#2563eb;--acc-d:#dbeafe;--acc-g:#2563eb18;
  --green:#16a34a;--green-d:#dcfce7;
  --amber:#d97706;--amber-d:#fef3c7;
  --red:#dc2626;--red-d:#fee2e2;
  --purple:#7c3aed;--purple-d:#ede9fe;
  --tb-bg:#ffffff;--tb-bd:#dde1e7;
  --pc:#fee2e2;--pct:#dc2626;--ph:#ffedd5;--pht:#c2410c;
  --pm:#fef3c7;--pmt:#b45309;--pls:#dcfce7;--plt:#15803d;
  --r:7px;--rl:11px;--rxl:16px;
  --ff:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;--mono:'Courier New',Courier,monospace;
}

/* ═══ THEME: SEPIA (Warm Office) ═══ */
[data-theme="sepia"]{
  --bg:#1a1610;--s1:#211e17;--s2:#28241b;--s3:#322e23;
  --bd:#3d3828;--bd2:#554f3a;
  --tx:#e8dfc8;--tx2:#9e9278;--tx3:#554f3a;
  --acc:#d4a853;--acc-d:#2d2010;--acc-g:#d4a85320;
  --green:#7cad5a;--green-d:#1a2610;
  --amber:#d4a853;--amber-d:#2d2010;
  --red:#e06060;--red-d:#2d1010;
  --purple:#b088e8;--purple-d:#201530;
  --tb-bg:#211e17;--tb-bd:#3d3828;
  --pc:#2d1010;--pct:#e06060;--ph:#2d1a08;--pht:#d4834a;
  --pm:#2d2010;--pmt:#d4a853;--pls:#1a2610;--plt:#7cad5a;
  --r:7px;--rl:11px;--rxl:16px;
  --ff:Georgia,'Times New Roman',serif;--mono:'Courier New',Courier,monospace;
}

html,body{height:100%;font-family:var(--ff);background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}::-webkit-scrollbar-track{background:transparent}

/* BOOT */
#boot{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px;transition:opacity .35s}
#boot.fade{opacity:0;pointer-events:none}
.boot-logo{font-size:38px;font-weight:700;letter-spacing:-1.5px}.boot-logo b{color:var(--acc)}
.spin{width:26px;height:26px;border:2px solid var(--bd2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* AUTH */
#auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.aw{width:380px}
.alo{font-size:28px;font-weight:700;letter-spacing:-1px;margin-bottom:4px}.alo b{color:var(--acc)}
.asu{font-size:15px;color:var(--tx2);margin-bottom:28px}

.afl{display:block;font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.afi{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 13px;color:var(--tx);font-family:var(--ff);font-size:16px;outline:none;transition:border .15s;margin-bottom:12px}
.afi:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-g)}
.abtn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:var(--r);padding:11px;font-size:16px;font-weight:600;cursor:pointer;font-family:var(--ff);margin-top:4px;transition:opacity .15s}
.abtn:hover{opacity:.88}.aerr{font-size:14px;color:var(--red);margin-top:10px;text-align:center;min-height:18px}

/* APP */
#app{display:none;height:100vh;flex-direction:column;overflow:hidden}

/* TOPBAR */
.tb{height:50px;border-bottom:1px solid var(--tb-bd);display:flex;align-items:center;padding:0 16px;gap:10px;background:var(--tb-bg);flex-shrink:0;z-index:50}
.tblo{font-size:17px;font-weight:700;letter-spacing:-.5px;margin-right:4px;white-space:nowrap;flex-shrink:0}.tblo b{color:var(--acc)}
.nav{display:flex;gap:1px;overflow-x:auto;flex:1}.nav::-webkit-scrollbar{height:0}
.nt{padding:5px 11px;border-radius:var(--r);font-size:14px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.nt:hover{background:var(--s2);color:var(--tx)}.nt.on{background:var(--acc-d);color:var(--acc);font-weight:600}
.tbr{display:flex;align-items:center;gap:5px;margin-left:auto;flex-shrink:0}

.ibt{background:none;border:none;cursor:pointer;color:var(--tx2);padding:6px;border-radius:var(--r);line-height:0;transition:all .15s;position:relative}
.ibt:hover{background:var(--s2);color:var(--tx)}
.nbdot{position:absolute;top:3px;right:3px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--tb-bg);display:none}
.uch{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:4px 8px;cursor:pointer;transition:all .15s}
.uch:hover{border-color:var(--bd2)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.av20{width:20px;height:20px;font-size:10px}.av26{width:26px;height:26px;font-size:12px}.av32{width:32px;height:32px;font-size:14px}.av40{width:40px;height:40px;font-size:16px}

/* PAGES */
.main{flex:1;overflow:hidden;display:flex}
.pg{flex:1;overflow-y:auto;padding:22px 24px;display:none}
.pg.on{display:block}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);padding:18px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}

/* METRICS */
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:20px}
.mc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);padding:15px}
.mv{font-size:30px;font-weight:700;line-height:1;margin-bottom:3px;font-family:var(--mono)}
.ml{font-size:13px;color:var(--tx2)}.ms{font-size:12px;color:var(--tx3);margin-top:3px}
.mc.bl .mv{color:var(--acc)}.mc.gr .mv{color:var(--green)}.mc.am .mv{color:var(--amber)}.mc.re .mv{color:var(--red)}.mc.pu .mv{color:var(--purple)}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:12px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.pc{background:var(--pc);color:var(--pct)}.ph{background:var(--ph);color:var(--pht)}
.pm{background:var(--pm);color:var(--pmt)}.pl{background:var(--pls);color:var(--plt)}
.st{background:var(--s3);color:var(--tx2)}.si{background:var(--acc-d);color:var(--acc)}
.sr{background:var(--purple-d);color:var(--purple)}.sd{background:var(--green-d);color:var(--green)}.sc{background:var(--s3);color:var(--tx3)}
.dl-ok{color:var(--green);font-size:12px}.dl-w{color:var(--amber);font-size:12px}.dl-o{color:var(--red);font-size:12px}

/* KANBAN */
.kb{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.kc{background:var(--s2);border-radius:var(--rl);padding:11px;min-width:245px;width:245px;flex-shrink:0;transition:background .15s,box-shadow .15s}
.kc.drag-over{background:var(--acc-g);box-shadow:0 0 0 2px var(--acc);border-radius:var(--rl)}
.kch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kcl{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px}
.kpip{width:7px;height:7px;border-radius:50%}
.kcc{font-size:12px;background:var(--s3);border:1px solid var(--bd);padding:1px 6px;border-radius:8px;color:var(--tx2)}
.kcards{display:flex;flex-direction:column;gap:7px;min-height:48px;border-radius:var(--r);padding:2px;transition:background .15s}
.tcard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);padding:11px;cursor:grab;transition:all .12s;position:relative}
.tcard:active{cursor:grabbing}
.tcard:hover{border-color:var(--acc);transform:translateY(-1px)}
.tcard.dragging{opacity:.35;transform:scale(.97);border-color:var(--acc)}
.tct{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:7px;color:var(--tx)}
.tcm{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.avs{display:flex;margin-left:auto}.avs .av{margin-left:-4px;border:2px solid var(--s1)}.avs .av:first-child{margin-left:0}
/* Quick status button on card */
.qs-btn{position:absolute;top:7px;right:7px;background:var(--s3);border:none;border-radius:4px;padding:2px 5px;cursor:pointer;font-size:11px;color:var(--tx2);opacity:0;transition:opacity .15s;font-family:var(--ff);font-weight:600;line-height:1.4;z-index:2}
.tcard:hover .qs-btn{opacity:1}
.qs-btn:hover{background:var(--bd2);color:var(--tx)}
/* Quick status dropdown */
.qs-menu{position:fixed;background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);z-index:900;min-width:160px;box-shadow:0 8px 30px rgba(0,0,0,.35);padding:5px}
.qs-item{padding:7px 12px;font-size:14px;cursor:pointer;border-radius:var(--r);color:var(--tx2);display:flex;align-items:center;gap:7px;transition:all .1s;white-space:nowrap}
.qs-item:hover{background:var(--s2);color:var(--tx)}
.qs-item.active{color:var(--acc);font-weight:600}
.qs-item .qsdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r);border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:14px;cursor:pointer;font-weight:500;font-family:var(--ff);transition:all .13s;white-space:nowrap}
.btn:hover{background:var(--s3);border-color:var(--bd2)}.btn:active{transform:scale(.97)}
.bp{background:var(--acc);color:#fff;border-color:var(--acc)}.bp:hover{opacity:.88;background:var(--acc)}
.bsm{padding:4px 9px;font-size:13px}
.bd2{background:var(--red-d);color:var(--red);border-color:var(--red-d)}.bd2:hover{opacity:.85}
.bg{background:none;border-color:transparent;color:var(--tx2)}.bg:hover{background:var(--s2);border-color:var(--bd)}

/* FORM */
.fg{margin-bottom:13px}.fl{display:block;font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fi2{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:8px 11px;color:var(--tx);font-family:var(--ff);font-size:15px;outline:none;transition:border .15s}
.fi2:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-g)}
select.fi2 option{background:var(--s2)}
textarea.fi2{resize:vertical;min-height:68px;line-height:1.5}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:800;padding:12px;backdrop-filter:blur(3px)}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rxl);width:100%;max-width:580px;max-height:92vh;overflow-y:auto}
.mlg{max-width:760px}
.mh{padding:18px 22px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.mb{padding:16px 22px}
.mf{padding:12px 22px 18px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--bd)}
.cx{background:none;border:none;cursor:pointer;color:var(--tx2);font-size:22px;line-height:1;padding:2px 6px;border-radius:var(--r);transition:all .13s}
.cx:hover{background:var(--s2);color:var(--tx)}

/* STATUS FLOW */
.sf{display:flex;align-items:center;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.ss{font-size:13px;padding:5px 11px;border-radius:9px;border:1px solid var(--bd);cursor:pointer;color:var(--tx2);background:var(--s2);transition:all .13s;font-weight:500}
.ss:hover{border-color:var(--bd2)}.sarr{color:var(--tx3);font-size:13px}
.ss.on.todo{background:var(--s3);color:var(--tx);border-color:var(--bd2)}
.ss.on.ip{background:var(--acc-d);color:var(--acc);border-color:var(--acc-d)}
.ss.on.ir{background:var(--purple-d);color:var(--purple)}
.ss.on.dn{background:var(--green-d);color:var(--green)}

/* COMMENTS */
.cmt{display:flex;gap:8px;margin-bottom:11px}
.cmtb{flex:1;background:var(--s2);border-radius:var(--rl);padding:9px 12px}
.cmta{font-size:13px;font-weight:700;color:var(--tx)}.cmtt{font-size:12px;color:var(--tx3);margin-left:6px}
.cmtc{font-size:14px;color:var(--tx2);margin-top:3px;line-height:1.5}

/* LOG */
.li{display:flex;gap:7px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:13px}
.lic{width:20px;height:20px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:var(--tx2)}
.lit{color:var(--tx2);line-height:1.5;flex:1}.lim{color:var(--tx3);font-size:12px}

/* PROGRESS */
.pb{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:3px;transition:width .35s}

/* TABLE */
.dt{width:100%;border-collapse:collapse;font-size:14px}
.dt th{padding:8px 12px;text-align:left;font-size:12px;font-weight:700;color:var(--tx2);border-bottom:1px solid var(--bd);white-space:nowrap;text-transform:uppercase;letter-spacing:.4px}
.dt td{padding:9px 12px;border-bottom:1px solid var(--bd);vertical-align:middle}
.dt tr:hover td{background:var(--s2)}.dt tr{cursor:pointer}

/* ROLE PILLS */
.rp{font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px}
.ra{background:var(--purple-d);color:var(--purple)}.rm{background:var(--acc-d);color:var(--acc)}.rmb{background:var(--s3);color:var(--tx2)}

/* AI PANEL */
.aip{background:var(--acc-d);border:1px solid var(--acc-d);border-radius:var(--rl);padding:16px;margin-bottom:14px;border-color:var(--bd)}
.aih{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.aiico{width:22px;height:22px;background:var(--acc);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.ait{font-size:14px;font-weight:700;color:var(--acc)}.ais{font-size:12px;color:var(--tx3);margin-left:auto}
.gr{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.gn{font-size:13px;color:var(--tx);width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.gb{flex:1;height:7px;background:var(--s3);border-radius:3px;overflow:hidden}
.gf{height:100%;border-radius:3px;transition:width .5s}
.gv{font-size:12px;font-family:var(--mono);width:30px;text-align:right;color:var(--tx2)}
.rc{border-radius:var(--r);padding:8px 11px;margin-bottom:7px;font-size:13px;line-height:1.6;border-left:3px solid}
.rw{background:var(--amber-d);border-color:var(--amber);color:var(--amber)}
.ro{background:var(--green-d);border-color:var(--green);color:var(--green)}
.rd{background:var(--red-d);border-color:var(--red);color:var(--red)}
.ri{background:var(--acc-d);border-color:var(--acc);color:var(--acc)}

/* CHECKLIST */
.chi{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:14px;color:var(--tx)}
.chi input[type=checkbox]{accent-color:var(--acc);width:13px;height:13px;cursor:pointer}
.chi.chd span{text-decoration:line-through;color:var(--tx3)}

/* NOTIFICATIONS */
.npanel{position:fixed;top:50px;right:10px;width:310px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);z-index:600;box-shadow:0 10px 40px rgba(0,0,0,.4)}
.ni{display:flex;gap:7px;padding:9px 13px;border-bottom:1px solid var(--bd);cursor:pointer}
.ni:hover{background:var(--s2)}.ni.unr{background:var(--acc-g)}
.ni .nd{width:6px;height:6px;border-radius:50%;background:var(--acc);flex-shrink:0;margin-top:4px}

/* FILTER */
.fr{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.fi3{font-size:13px;padding:3px 9px;border:1px solid var(--bd);border-radius:7px;background:var(--s2);color:var(--tx2);cursor:pointer;transition:all .13s;font-weight:500}
.fi3:hover{border-color:var(--bd2);color:var(--tx)}.fi3.on{background:var(--acc);color:#fff;border-color:var(--acc)}

/* DIVIDER */
.dv{border:none;border-top:1px solid var(--bd);margin:14px 0}

/* TAG */
.tag{font-size:11px;padding:2px 6px;border-radius:5px;background:var(--purple-d);color:var(--purple);font-weight:700}

/* USER MENU */
.umenu{position:fixed;background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);padding:6px;z-index:700;right:14px;top:52px;min-width:200px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.umi{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);cursor:pointer;font-size:14px;color:var(--tx2);transition:all .13s}
.umi:hover{background:var(--s2);color:var(--tx)}.umi.danger{color:var(--red)}.umi.danger:hover{background:var(--red-d)}

/* GANTT — MS Project style */
.gantt-outer{overflow:hidden;border:1px solid var(--bd);border-radius:var(--rl);background:var(--s1)}
.gantt-split{display:flex;height:calc(100vh - 280px);min-height:400px}
/* Left panel — task info table */
.gantt-left{flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;border-right:2px solid var(--bd2)}
.gantt-resize-handle{width:4px;background:var(--bd2);cursor:col-resize;flex-shrink:0;transition:background .15s}
.gantt-resize-handle:hover{background:var(--acc)}
/* Right panel — timeline */
.gantt-right{flex:1;overflow:auto;display:flex;flex-direction:column;position:relative}
/* Header rows */
.gantt-thead{flex-shrink:0;position:sticky;top:0;z-index:20;background:var(--s2)}
.gantt-hrow{display:flex;border-bottom:1px solid var(--bd)}
/* Left header cells */
.gh-cell{padding:0 10px;font-size:12px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;border-right:1px solid var(--bd);display:flex;align-items:center;height:26px;white-space:nowrap;overflow:hidden;flex-shrink:0}
/* Timeline header */
.gantt-th-right{flex:1;overflow:hidden;min-width:0}
.gantt-month-row{display:flex;height:26px;border-bottom:1px solid var(--bd)}
.gantt-month-cell{display:flex;align-items:center;padding-left:8px;font-size:12px;font-weight:700;color:var(--tx);border-right:1px solid var(--bd);white-space:nowrap;overflow:hidden;flex-shrink:0;background:var(--s2)}
.gantt-day-row{display:flex;height:26px}
.gantt-day-cell{display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--tx3);border-right:1px solid var(--bd);flex-shrink:0;font-family:var(--mono);font-weight:500}
.gantt-day-cell.today{color:var(--acc);font-weight:700;background:var(--acc-g)}
.gantt-day-cell.weekend{background:var(--s3);color:var(--tx3)}
/* Body */
.gantt-body{display:flex;flex:1;overflow:hidden}
.gantt-body-left{flex-shrink:0;overflow-y:auto;overflow-x:hidden}
.gantt-body-left::-webkit-scrollbar{display:none}
.gantt-body-right{flex:1;overflow:auto}
.gantt-body-right::-webkit-scrollbar-height{height:6px}
/* Row */
.grow2{display:flex;border-bottom:1px solid var(--bd);min-height:36px;transition:background .1s}
.grow2:hover{background:var(--s2)}
.grow2.gparent-row{background:var(--s2)}
.grow2.gsub-row{background:var(--bg)}
.grow2.gsub-row:hover{background:var(--s2)}
/* Left cells in body */
.gc{display:flex;align-items:center;padding:0 8px;font-size:13px;color:var(--tx);border-right:1px solid var(--bd);flex-shrink:0;overflow:hidden;white-space:nowrap;min-height:36px}
.gc-title{flex:1;cursor:pointer;display:flex;align-items:center;gap:4px;min-width:0}
.gc-title:hover .gc-name{text-decoration:underline;color:var(--acc)}
.gc-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gc-collapse{background:none;border:1px solid var(--bd);width:14px;height:14px;border-radius:3px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--tx2);font-family:var(--ff);transition:all .13s;padding:0;line-height:1}
.gc-collapse:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
.gc-indent{flex-shrink:0} /* spacer for indent */
/* Timeline body cells */
.gantt-chart-row{display:flex;position:relative;min-height:36px;flex-shrink:0}
.gantt-cell-bg{position:absolute;top:0;bottom:0;flex-shrink:0}
.gantt-cell-bg.weekend-bg{background:rgba(128,128,128,.06)}
.gantt-cell-bg.today-bg{background:var(--acc-g)}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--acc);z-index:4;pointer-events:none;opacity:.7}
/* Bars */
.gbar2{position:absolute;top:7px;height:20px;border-radius:3px;cursor:pointer;z-index:3;display:flex;align-items:center;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:filter .15s}
.gbar2:hover{filter:brightness(1.12);z-index:5}
.gbar2-sub{top:9px;height:16px;border-radius:2px;opacity:.85}
.gbar2-label{font-size:11px;font-weight:700;color:#fff;padding:0 5px;white-space:nowrap;overflow:hidden;text-shadow:0 1px 2px rgba(0,0,0,.4)}
/* Progress fill inside bar */
.gbar2-progress{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.25);border-radius:3px 0 0 3px}
/* Diamond milestone */
.gbar2-diamond{position:absolute;width:12px;height:12px;background:var(--amber);transform:rotate(45deg);top:12px;z-index:3;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.3)}
/* Dependency arrow */
.gantt-dep-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;overflow:visible}
/* Scrollbar sync */
.gantt-body-right::-webkit-scrollbar{height:6px;width:6px}
.gantt-body-right::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
/* Grid lines */
.gantt-vline{position:absolute;top:0;bottom:0;width:1px;background:var(--bd);pointer-events:none;z-index:1;opacity:.5}
.gantt-vline.today-vline{background:var(--acc);opacity:.6;width:2px}
.gantt-vline.weekend-vline{background:var(--bd);opacity:.8}

/* THEME PICKER */
.theme-picker{display:flex;gap:6px}
.tpick{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s;flex-shrink:0}
.tpick:hover{transform:scale(1.15)}.tpick.on{border-color:var(--tx)}

/* TOAST */
@keyframes tslide{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);border-radius:var(--rl);padding:10px 20px;font-size:15px;z-index:9000;box-shadow:0 8px 32px rgba(0,0,0,.4);white-space:nowrap;animation:tslide .25s ease;pointer-events:none}

/* REPORT PAGE */
.rpt-period{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.rpt-block{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);padding:18px;margin-bottom:14px}
.rpt-block-title{font-size:13px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.rpt-ico{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.rpt-kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:12px}
.rpt-kpi-item{background:var(--s2);border-radius:var(--r);padding:12px;text-align:center}
.rpt-kpi-val{font-size:24px;font-weight:700;font-family:var(--mono);line-height:1}
.rpt-kpi-lbl{font-size:12px;color:var(--tx2);margin-top:4px}
.rpt-kpi-sub{font-size:11px;color:var(--tx3);margin-top:2px}
.rpt-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rpt-bar-lbl{font-size:13px;color:var(--tx);width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rpt-bar-track{flex:1;height:8px;background:var(--s3);border-radius:4px;overflow:hidden}
.rpt-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.rpt-bar-val{font-size:13px;color:var(--tx2);width:38px;text-align:right;font-family:var(--mono)}
.star-row{display:flex;gap:2px;align-items:center}
.star{color:var(--amber);font-size:15px}.star-e{color:var(--s3);font-size:15px}
.rpt-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.rpt-tbl th{padding:6px 10px;text-align:left;font-size:12px;font-weight:700;color:var(--tx2);border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.4px}
.rpt-tbl td{padding:7px 10px;border-bottom:1px solid var(--bd);vertical-align:middle}
.rpt-tbl tr:last-child td{border-bottom:none}
.rpt-sum{background:var(--acc-d);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;margin-bottom:14px}
.rpt-sum-title{font-size:14px;font-weight:700;color:var(--acc);margin-bottom:8px}
.rpt-sum-text{font-size:14px;color:var(--tx2);line-height:1.9}
/* PERSONAL TASKS */
.ptbadge{font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px}
.pt-self{background:var(--purple-d);color:var(--purple)}
.pt-recv{background:var(--acc-d);color:var(--acc)}
.pt-note{font-size:13px;color:var(--tx3);background:var(--s2);border-radius:var(--r);padding:8px 12px;margin-bottom:14px;border-left:3px solid var(--acc)}

/* SUBTASK KANBAN */
.tcard-sub{border-left:3px solid var(--acc-d);margin-left:14px;background:var(--s2)}
.tcard-sub:hover{border-left-color:var(--acc)}
.sub-parent-link{font-size:11px;color:var(--acc);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:3px;margin-bottom:5px;cursor:pointer;opacity:.8}
.sub-parent-link:hover{opacity:1;text-decoration:underline}
.task-type-badge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;flex-shrink:0}
.tbg-main{background:var(--s3);color:var(--tx2)}
.tbg-sub{background:var(--acc-d);color:var(--acc)}
/* Collapse toggle button — dùng chung cho Kanban + Bảng */
.kb-collapse-btn{background:none;border:1px solid var(--bd);border-radius:3px;width:16px;height:16px;cursor:pointer;font-size:10px;font-weight:700;color:var(--tx2);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .13s;font-family:var(--ff);padding:0;line-height:1;vertical-align:middle}
.kb-collapse-btn:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
/* Subtask wrapper trong kanban — dùng để ẩn/hiện nhóm */
.kb-sub-group{display:flex;flex-direction:column;gap:7px;margin-top:0}
.kb-sub-group.kb-hidden{display:none}
/* Bảng task: row subtask có thể ẩn */
.tbl-sub-row.tbl-hidden{display:none}

/* SUBTASK FULL */
.strow{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:var(--r);background:var(--s2);margin-bottom:6px;border-left:3px solid var(--acc);cursor:pointer;transition:border-color .13s}
.strow:hover{border-left-color:var(--green);background:var(--s3)}
.strow-info{flex:1;min-width:0}
.strow-title{font-size:14px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.strow-meta{font-size:12px;color:var(--tx3);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.gbtn{background:none;border:1px solid var(--bd);cursor:pointer;color:var(--tx2);padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;transition:all .13s;flex-shrink:0;font-family:var(--ff)}
.gbtn:hover{background:var(--s3);color:var(--tx)}
/* Gantt subtask rows */
.grow-sub{background:var(--s2)}
.grow-sub .glabel{border-left:3px solid var(--acc-d)}
.grow-sub .glt{font-size:12px;color:var(--tx2);padding-left:16px}
.grow-sub .glm{padding-left:16px}
.gcollapse{font-size:12px;padding:1px 5px;border-radius:3px;cursor:pointer;user-select:none;color:var(--tx3);transition:all .13s;background:none;border:none;font-family:var(--ff)}
.gcollapse:hover{background:var(--s3);color:var(--tx)}</style>
</head>

<script>
// ═══════════════════════════════════════════════
// STORAGE ENGINE — tất cả dữ liệu lưu localStorage
// ═══════════════════════════════════════════════
const DB_KEY = 'taskflow_v3';

const DEFAULT_DATA = {
  users:[
    {id:'admin',username:'admin',password:'BaoHa@220680',full_name:'Quản Trị Viên',role:'admin',color:'#7c3aed'},
    {id:'u1',username:'minhtt',password:'123456',full_name:'Trần Tuấn Minh',role:'manager',color:'#2563eb'},
    {id:'u2',username:'lanpd',password:'123456',full_name:'Phạm Diệu Lan',role:'member',color:'#16a34a'},
    {id:'u3',username:'hunglt',password:'123456',full_name:'Lê Trường Hùng',role:'member',color:'#d97706'},
    {id:'u4',username:'anhm',password:'123456',full_name:'Mai Thị Anh',role:'member',color:'#dc2626'},
    {id:'u5',username:'ducnp',password:'123456',full_name:'Nguyễn Phúc Đức',role:'member',color:'#0891b2'},
    {id:'u6',username:'hainh',password:'123456789',full_name:'Nguyễn Hải Nh',role:'member',color:'#059669'},
    {id:'u7',username:'trangnt',password:'123456789',full_name:'Nguyễn Thị Trang',role:'member',color:'#db2777'},
  ],
  tasks:[],
  asn:{},cmts:{},logs:{},notifs:[],theme:'dark',
};

function dbLoad(){
  try{
    const raw=localStorage.getItem(DB_KEY);
    if(raw){
      const d=JSON.parse(raw);
      // Merge defaults for any missing keys
      return{...DEFAULT_DATA,...d};
    }
  }catch(e){}
  // First run — seed demo tasks
  const off=n=>{const x=new Date();x.setDate(x.getDate()+n);return x.toISOString().split('T')[0]};
  const demoTasks=[
    {id:'t1',title:'Thiết kế UI Dashboard',desc:'Wireframe và mockup cho dashboard chính, metric cards, kanban view.',priority:'high',status:'inreview',creator:'u1',start:off(-10),deadline:off(4),tags:['UI','Design'],subs:[{t:'Wireframe layout',d:true},{t:'Màu sắc & typography',d:true},{t:'Thiết kế component',d:true},{t:'Review với team',d:false}],created:off(-10)},
    {id:'t2',title:'API xác thực người dùng',desc:'JWT + Refresh Token, Google OAuth, rate limiting.',priority:'critical',status:'inprogress',creator:'u1',start:off(-12),deadline:off(0),tags:['Backend','Security'],subs:[{t:'JWT login/register',d:true},{t:'Refresh token',d:true},{t:'Google OAuth',d:false},{t:'Rate limiting',d:false}],created:off(-12)},
    {id:'t3',title:'Tài liệu Swagger API',desc:'OpenAPI 3.0 documentation cho toàn bộ REST endpoints.',priority:'medium',status:'todo',creator:'u1',start:off(-1),deadline:off(9),tags:['Docs'],subs:[{t:'Liệt kê endpoints',d:false},{t:'Viết schemas',d:false}],created:off(-5)},
    {id:'t4',title:'QA Kanban board',desc:'Test drag & drop, cross-browser, mobile responsive.',priority:'high',status:'todo',creator:'u2',start:off(-2),deadline:off(1),tags:['QA'],subs:[{t:'Test desktop',d:false},{t:'Test mobile',d:false}],created:off(-3)},
    {id:'t5',title:'Deploy CI/CD & Staging',desc:'GitHub Actions, Docker, Nginx, deploy AWS EC2.',priority:'critical',status:'done',creator:'u1',start:off(-14),deadline:off(-2),tags:['DevOps'],subs:[{t:'Dockerfile',d:true},{t:'GitHub Actions',d:true},{t:'Nginx config',d:true}],created:off(-14)},
    {id:'t6',title:'Hệ thống thông báo Realtime',desc:'WebSocket, thông báo khi task giao, comment mới.',priority:'medium',status:'inprogress',creator:'u1',start:off(-7),deadline:off(6),tags:['Backend'],subs:[{t:'Socket.io server',d:true},{t:'Frontend handler',d:false}],created:off(-7)},
  ];
  const demoAsn={t1:['u2','u5'],t2:['u3'],t3:['u5'],t4:['u4'],t5:['u3','u5'],t6:['u2']};
  const demoCmts={
    t1:[{id:'c1',uid:'u2',text:'Đã hoàn thành 3/4 subtask. Đang chờ feedback.',at:off(-1)+'T10:30:00'}],
    t2:[{id:'c2',uid:'u3',text:'JWT xong, đang gặp vấn đề với Google OAuth callback.',at:off(0)+'T09:00:00'}],
  };
  const demoLogs={
    t1:[{i:'✦',t:'Trần Tuấn Minh tạo task',ts:off(-10)},{i:'→',t:'Giao cho Phạm Diệu Lan, Nguyễn Phúc Đức',ts:off(-10)},{i:'◆',t:'Todo → In Progress',ts:off(-8)},{i:'◆',t:'In Progress → In Review',ts:off(-1)}],
    t2:[{i:'✦',t:'Trần Tuấn Minh tạo task',ts:off(-12)},{i:'→',t:'Giao cho Lê Trường Hùng',ts:off(-12)},{i:'◆',t:'Todo → In Progress',ts:off(-9)}],
  };
  const init={...DEFAULT_DATA,tasks:demoTasks,asn:demoAsn,cmts:demoCmts,logs:demoLogs};
  dbSave(init);
  return init;
}

function dbSave(data){
  try{
    localStorage.setItem(DB_KEY,JSON.stringify(data));
  }catch(e){
    console.warn('localStorage full',e);
    // Hiển thị cảnh báo cho người dùng — chỉ 1 lần mỗi phiên
    if(!window._quotaWarned){
      window._quotaWarned=true;
      alert('⚠️ Cảnh báo: Bộ nhớ trình duyệt sắp đầy!\nMột số dữ liệu có thể không được lưu.\nVui lòng liên hệ admin hoặc xoá bớt dữ liệu cũ.');
    }
  }
}

function save(){
  dbSave({users:S.users,tasks:S.tasks,asn:S.asn,cmts:S.cmts,logs:S.logs,notifs:S.notifs,theme:S.theme});
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const loaded = dbLoad();
const S = {
  cur: null,
  users: loaded.users,
  tasks: loaded.tasks,
  asn: loaded.asn,
  cmts: loaded.cmts,
  logs: loaded.logs,
  notifs: loaded.notifs,
  theme: loaded.theme||'dark',
  page: 'dashboard',
  fStat: 'all',
  fPri: 'all',
  notifOpen: false,
  ganttCollapsed: {},   // Gantt: {parentId: true} → subtask ẩn
  kbCollapsed: {},      // Kanban: {parentId: true} → subtask ẩn
  tblCollapsed: {},     // Bảng task: {parentId: true} → subtask ẩn
};

// ═══════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════
function setTheme(t){
  S.theme=t;
  document.documentElement.setAttribute('data-theme',t);
  document.querySelectorAll('.tpick').forEach(el=>el.classList.remove('on'));
  const tp=document.getElementById(`tp-${t}`);
  if(tp)tp.classList.add('on');
  save();
}
// Apply saved theme immediately
document.documentElement.setAttribute('data-theme',S.theme);

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
// ── XSS PROTECTION: escape mọi dữ liệu người dùng trước khi đưa vào HTML ──
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const ini=n=>n?n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';
const avH=(u,cls)=>u?`<div class="av ${cls}" style="background:${u.color}">${ini(u.full_name)}</div>`:'';
const uby=id=>S.users.find(u=>u.id===id);
const dlS=(dd,st)=>{
  if(st==='done'||st==='cancelled')return{c:'',l:''};
  if(!dd)return{c:'',l:''};
  const diff=Math.ceil((new Date(dd)-new Date())/86400000);
  if(diff<0)return{c:'dl-o',l:`Quá ${Math.abs(diff)}n`};
  if(diff<=3)return{c:'dl-w',l:`Còn ${diff}n`};
  return{c:'dl-ok',l:`Còn ${diff}n`};
};
const fd=d=>d?new Date(d).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
const fdt=d=>d?new Date(d).toLocaleString('vi-VN',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
const pb=p=>{const m={critical:'pc Critical',high:'ph High',medium:'pm Medium',low:'pl Low'};const[c,l]=(m[p]||'pl Low').split(' ');return`<span class="badge ${c}">${l}</span>`};
const sb=s=>{const m={todo:'st Todo',inprogress:'si In Progress',inreview:'sr In Review',done:'sd Done',cancelled:'sc Cancelled'};const[c,l]=(m[s]||'st ?').split(' ');return`<span class="badge ${c}">${l}</span>`};
const pv=p=>({critical:4,high:3,medium:2,low:1}[p]||1);
const off=n=>{const x=new Date();x.setDate(x.getDate()+n);return x.toISOString().split('T')[0]};

function pushN(text,tid=null){
  S.notifs.unshift({id:Date.now(),text,time:new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}),read:false,tid});
  document.getElementById('nbdot').style.display='block';
  save();
}

function showToast(msg,color='blue'){
  const cmap={green:'var(--green-d)',blue:'var(--acc-d)',red:'var(--red-d)',amber:'var(--amber-d)'};
  const bmap={green:'var(--green)',blue:'var(--acc)',red:'var(--red)',amber:'var(--amber)'};
  const t=document.createElement('div');
  t.className='toast';
  t.textContent=msg; // textContent thay innerHTML để tránh XSS
  t.style.background=cmap[color]||cmap.blue;
  t.style.border=`1px solid ${bmap[color]||bmap.blue}`;
  t.style.color='var(--tx)';
  document.body.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(()=>t.remove(),300);},3000);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('auth').style.display!=='none')doLogin();
  if(e.key==='Escape'){
    if(document.getElementById('mroot').innerHTML)closeModal();
  }
});

function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  document.getElementById('lerr').textContent='';
  const found=S.users.find(x=>x.username===u&&x.password===p);
  if(found){S.cur=found;launchApp();}
  else document.getElementById('lerr').textContent='Sai tên đăng nhập hoặc mật khẩu.';
}

function doLogout(){
  save();S.cur=null;S.page='dashboard';S.notifOpen=false;
  document.getElementById('app').style.display='none';
  document.getElementById('auth').style.display='flex';
  document.getElementById('lu').value='';document.getElementById('lp').value='';
  document.getElementById('mroot').innerHTML='';document.getElementById('nroot').innerHTML='';
}

function launchApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='flex';
  const u=S.cur;
  document.getElementById('tb-av').style.background=u.color;
  document.getElementById('tb-av').textContent=ini(u.full_name);
  document.getElementById('tb-name').textContent=u.full_name.split(' ').slice(-1)[0];
  // Set theme indicator
  document.querySelectorAll('.tpick').forEach(el=>el.classList.remove('on'));
  const tp=document.getElementById(`tp-${S.theme}`);if(tp)tp.classList.add('on');
  const unread=S.notifs.filter(n=>!n.read).length;
  document.getElementById('nbdot').style.display=unread?'block':'none';
  setupNav();go('dashboard');
}

function setupNav(){
  const u=S.cur;
  const tabs=[
    {id:'dashboard',label:'Dashboard',roles:['admin','manager','member']},
    {id:'tasks',label:'Tất cả task',roles:['admin','manager','member']},
    {id:'gantt',label:'Sơ đồ Gantt',roles:['admin','manager','member']},
    {id:'mytasks',label:'Việc của tôi',roles:['member','manager']},
    {id:'reports',label:'Báo cáo',roles:['admin','manager','member']},
    {id:'analysis',label:'Phân tích AI',roles:['admin','manager']},
    {id:'members',label:'Thành viên',roles:['admin','manager']},
    {id:'admin',label:'⚙ Quản trị',roles:['admin']},
  ];
  document.getElementById('nav').innerHTML=tabs.filter(t=>t.roles.includes(u.role)).map(t=>`<div class="nt" id="nt-${t.id}" onclick="go('${t.id}')">${t.label}</div>`).join('');
}

function go(page){
  S.page=page;
  document.querySelectorAll('.nt').forEach(el=>el.classList.remove('on'));
  const nt=document.getElementById(`nt-${page}`);if(nt)nt.classList.add('on');
  document.querySelectorAll('.pg').forEach(el=>el.classList.remove('on'));
  const pg=document.getElementById(`pg-${page}`);
  if(pg){pg.classList.add('on');rp(page);}
  closeMenu();
}

function rp(page){
  const el=document.getElementById(`pg-${page}`);if(!el)return;
  if(page==='dashboard')el.innerHTML=rDash();
  else if(page==='tasks')el.innerHTML=rTasks();
  else if(page==='gantt'){el.innerHTML=rGantt();drawGantt();}
  else if(page==='mytasks')el.innerHTML=rMy();
  else if(page==='personal')el.innerHTML=rPersonal();
  else if(page==='reports')el.innerHTML=rReports();
  else if(page==='analysis')el.innerHTML=rAnalysis();
  else if(page==='members')el.innerHTML=rMembers();
  else if(page==='admin')el.innerHTML=rAdmin();
}

// ═══════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════
function rDash(){
  const tasks=S.tasks;
  // Chỉ đếm task chính (không phải subtask) cho metrics
  const mainTasks=tasks.filter(t=>!t.parentId);
  const total=tasks.length,done=tasks.filter(t=>t.status==='done').length;
  const inprog=tasks.filter(t=>t.status==='inprogress').length;
  const inrev=tasks.filter(t=>t.status==='inreview').length;
  const over=tasks.filter(t=>t.status!=='done'&&t.status!=='cancelled'&&t.deadline&&new Date(t.deadline)<new Date()).length;
  const pct=total?Math.round(done/total*100):0;
  const cols=[{key:'todo',label:'Todo',col:'#6b7280'},{key:'inprogress',label:'In Progress',col:'var(--acc)'},{key:'inreview',label:'In Review',col:'var(--purple)'},{key:'done',label:'Done',col:'var(--green)'}];

  const kb=cols.map(c=>{
    // Task chính trong cột này
    let parents=mainTasks.filter(t=>t.status===c.key);
    if(S.cur.role==='member')parents=parents.filter(t=>(S.asn[t.id]||[]).includes(S.cur.id)||t.creator===S.cur.id);

    // Subtask trong cột này (kể cả subtask của task cha ở cột khác)
    let subs=tasks.filter(t=>t.parentId&&t.status===c.key);
    if(S.cur.role==='member')subs=subs.filter(t=>(S.asn[t.id]||[]).includes(S.cur.id)||t.creator===S.cur.id);

    // Build cards: task cha → subtask của nó (cùng cột), rồi subtask "mồ côi" (task cha ở cột khác)
    let cardsHtml='';
    parents.forEach(p=>{
      cardsHtml+=tcH(p);
      // Subtask của task cha này trong cùng cột
      const childHere=subs.filter(s=>s.parentId===p.id);
      if(childHere.length){
        const collapsed=!!S.kbCollapsed[p.id];
        cardsHtml+=`<div class="kb-sub-group${collapsed?' kb-hidden':''}" id="kb-sg-${esc(p.id)}">`;
        childHere.forEach(s=>{cardsHtml+=tcHSub(s);});
        cardsHtml+='</div>';
      }
    });
    // Subtask có task cha ở cột KHÁC nhưng bản thân ở cột này — hiện thẳng, không collapse
    const orphanSubs=subs.filter(s=>{
      const par=mainTasks.find(p=>p.id===s.parentId);
      return!par||par.status!==c.key;
    });
    orphanSubs.forEach(s=>{cardsHtml+=tcHSub(s);});

    const total=parents.length+subs.length;
    return`<div class="kc" id="kc-${c.key}"
      ondragover="kbDragOver(event,'${c.key}')"
      ondragleave="kbDragLeave(event)"
      ondrop="kbDrop(event,'${c.key}')">
      <div class="kch"><div class="kcl"><div class="kpip" style="background:${c.col}"></div>${c.label}</div><span class="kcc">${total}</span></div>
      <div class="kcards" id="kcards-${c.key}">${cardsHtml||''}</div>
      ${S.cur.role!=='member'&&c.key==='todo'?`<button class="btn bg bsm" style="width:100%;margin-top:7px;justify-content:center" onclick="openCreateTask()">+ Thêm task</button>`:''}</div>`;
  }).join('');

  // Upcoming deadlines — real data only, sorted by nearest deadline
  const upcoming=tasks
    .filter(t=>t.status!=='done'&&t.status!=='cancelled'&&t.deadline)
    .sort((a,b)=>new Date(a.deadline)-new Date(b.deadline))
    .slice(0,6);
  const upcomingHtml=upcoming.length?upcoming.map(t=>{
    const dl=dlS(t.deadline,t.status);
    const aIds=S.asn[t.id]||[];
    const av=aIds.length?avH(uby(aIds[0]),'av av20'):'';
    return`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd);cursor:pointer" onclick="openTask('${esc(t.id)}')">
      ${av}
      <div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.title)}</div></div>
      <span class="${dl.c}" style="font-size:10px;flex-shrink:0;font-weight:600">${dl.l||fd(t.deadline)}</span>
    </div>`;
  }).join('')
  :`<div style="color:var(--tx3);font-size:11px;padding:12px 0;text-align:center">Không có task nào sắp đến hạn</div>`;

  return`
  <div class="sh"><div style="font-size:18px;font-weight:700">Xin chào, ${S.cur.full_name.split(' ').slice(-1)[0]} 👋</div>${S.cur.role!=='member'?`<button class="btn bp" onclick="openCreateTask()">+ Tạo task mới</button>`:''}</div>
  <div class="mg">
    <div class="mc bl"><div class="mv">${total}</div><div class="ml">Tổng task</div><div class="ms">trong hệ thống</div></div>
    <div class="mc gr"><div class="mv">${done}</div><div class="ml">Hoàn thành</div><div class="ms">${pct}% tỉ lệ</div></div>
    <div class="mc am"><div class="mv">${inprog}</div><div class="ml">Đang xử lý</div><div class="ms">${inrev} chờ review</div></div>
    <div class="mc re"><div class="mv">${over}</div><div class="ml">Quá hạn</div><div class="ms">cần xử lý ngay</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 260px;gap:14px;margin-bottom:18px">
    <div></div>
    <div class="card" style="padding:14px 16px">
      <div style="font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Deadline sắp tới</div>
      ${upcomingHtml}
    </div>
  </div>
  <div class="sh">
    <div style="font-size:13px;font-weight:700">Kanban Board</div>
    <div style="display:flex;gap:6px">
      <button class="btn bsm" onclick="collapseAllKb(true)" title="Thu gọn tất cả subtask">▶ Thu gọn subtask</button>
      <button class="btn bsm" onclick="collapseAllKb(false)" title="Mở rộng tất cả subtask">▼ Mở rộng subtask</button>
    </div>
  </div>
  <div class="kb">${kb}</div>`;
}

// Card task chính trên Kanban
function tcH(task){
  const dl=dlS(task.deadline,task.status);
  const avs=(S.asn[task.id]||[]).slice(0,3).map(id=>avH(uby(id),'av av20')).join('');
  const subs=S.tasks.filter(t=>t.parentId===task.id);
  const subsDone=subs.filter(t=>t.status==='done').length;
  const hasSubs=subs.length>0;
  const collapsed=!!S.kbCollapsed[task.id];
  const canChange=S.cur.role!=='member'||(S.asn[task.id]||[]).includes(S.cur.id)||task.creator===S.cur.id;

  const collapseBtn=hasSubs
    ?`<button class="kb-collapse-btn" onclick="event.stopPropagation();toggleKbCollapse('${esc(task.id)}')" title="${collapsed?'Mở rộng subtask':'Thu gọn subtask'}">${collapsed?'▶':'▼'}</button>`
    :'';
  const subsInfo=hasSubs
    ?`<span style="font-size:9px;color:var(--tx3);display:flex;align-items:center;gap:2px">${collapseBtn}<span>◈ ${subsDone}/${subs.length}</span></span>`
    :'';

  return`<div class="tcard" draggable="${canChange}"
    onclick="openTask('${esc(task.id)}')"
    ondragstart="kbDragStart(event,'${esc(task.id)}')"
    ondragend="kbDragEnd(event)">
    <div class="tct" style="padding-right:${canChange?'22px':'0'}">${esc(task.title)}</div>
    <div class="tcm">${pb(task.priority)}${dl.l?`<span class="${dl.c}">${dl.l}</span>`:''}${(task.tags||[]).slice(0,1).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}${subsInfo}<div class="avs">${avs}</div></div>
    ${canChange?`<button class="qs-btn" onclick="event.stopPropagation();openQsMenu(event,'${esc(task.id)}',this)" title="Đổi trạng thái">⟳</button>`:''}
  </div>`;
}

// Card subtask trên Kanban — thụt vào, hiện tên task cha
function tcHSub(task){
  const dl=dlS(task.deadline,task.status);
  const avs=(S.asn[task.id]||[]).slice(0,2).map(id=>avH(uby(id),'av av20')).join('');
  const parent=S.tasks.find(t=>t.id===task.parentId);
  const canChange=S.cur.role!=='member'||(S.asn[task.id]||[]).includes(S.cur.id)||task.creator===S.cur.id;
  return`<div class="tcard tcard-sub" draggable="${canChange}"
    onclick="openTask('${esc(task.id)}')"
    ondragstart="kbDragStart(event,'${esc(task.id)}')"
    ondragend="kbDragEnd(event)">
    <div class="sub-parent-link" onclick="event.stopPropagation();openTask('${esc(task.parentId||'')}')">↳ ${esc(parent?.title||'Task cha')}</div>
    <div class="tct" style="padding-right:${canChange?'22px':'0'}">${esc(task.title)}</div>
    <div class="tcm">${pb(task.priority)}${dl.l?`<span class="${dl.c}">${dl.l}</span>`:''}<div class="avs">${avs}</div></div>
    ${canChange?`<button class="qs-btn" onclick="event.stopPropagation();openQsMenu(event,'${esc(task.id)}',this)" title="Đổi trạng thái">⟳</button>`:''}
  </div>`;
}

// ═══════════════════════════════════════════════
// ALL TASKS
// ═══════════════════════════════════════════════
function rTasks(){
  let tasks=[...S.tasks];
  if(S.fStat!=='all')tasks=tasks.filter(t=>t.status===S.fStat);
  if(S.fPri!=='all')tasks=tasks.filter(t=>t.priority===S.fPri);
  if(S.cur.role==='member'){
    tasks=tasks.filter(t=>(S.asn[t.id]||[]).includes(S.cur.id)||t.creator===S.cur.id);
  }

  // Sắp xếp: task cha trước, subtask ngay sau task cha tương ứng
  const allParents=tasks.filter(t=>!t.parentId);
  const orderedTasks=[];
  allParents.forEach(p=>{
    orderedTasks.push({task:p,isSub:false});
    tasks.filter(t=>t.parentId===p.id).forEach(s=>orderedTasks.push({task:s,isSub:true}));
  });
  // Subtask mà task cha bị filter ra ngoài — hiện thẳng
  tasks.filter(t=>t.parentId&&!allParents.find(p=>p.id===t.parentId))
    .forEach(t=>orderedTasks.push({task:t,isSub:true}));

  const isMember=S.cur.role==='member';
  const rows=orderedTasks.map(({task:t,isSub})=>{
    const dl=dlS(t.deadline,t.status);
    const avs=(S.asn[t.id]||[]).slice(0,3).map(id=>avH(uby(id),'av av20')).join('');
    const creator=uby(t.creator);
    const isSelf=t.creator===S.cur.id;
    const canAct=!isMember||isSelf;
    const parent=isSub?S.tasks.find(p=>p.id===t.parentId):null;

    // Subtask con của task cha này
    const children=!isSub?S.tasks.filter(s=>s.parentId===t.id&&tasks.find(tt=>tt.id===s.id)):[];
    const hasChildren=children.length>0;
    const collapsed=!isSub&&!!S.tblCollapsed[t.id];

    const typeBadge=isSub
      ?`<span class="task-type-badge tbg-sub">Subtask</span>`
      :`<span class="task-type-badge tbg-main">Task</span>`;

    // Nút collapse cho task cha có subtask
    const collapseBtn=hasChildren
      ?`<button class="kb-collapse-btn" onclick="event.stopPropagation();toggleTblCollapse('${esc(t.id)}')" title="${collapsed?'Mở rộng subtask':'Thu gọn subtask'}">${collapsed?'▶':'▼'}</button>`
      :`<span style="display:inline-block;width:16px"></span>`;

    const titleCell=isSub
      ?`<div style="padding-left:14px;border-left:2px solid var(--acc-d)">
          <div style="font-size:9px;color:var(--acc);font-weight:600;margin-bottom:2px;cursor:pointer" onclick="event.stopPropagation();openTask('${esc(t.parentId||'')}')">↳ ${esc(parent?.title||'Task cha')}</div>
          <div style="font-weight:600;font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title)}</div>
        </div>`
      :`<div style="display:flex;align-items:center;gap:5px">
          ${collapseBtn}
          <div style="min-width:0">
            <div style="font-weight:600;font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title)}</div>
            ${hasChildren?`<div style="font-size:9px;color:var(--tx3);margin-top:1px">◈ ${children.filter(s=>s.status==='done').length}/${children.length} subtask</div>`:''}
            <div style="margin-top:2px">${isSelf?`<span class="ptbadge pt-self">Tự tạo</span>`:`<span style="font-size:9px;color:var(--tx3)">Giao bởi: ${esc(creator?.full_name||'?')}</span>`}</div>
          </div>
        </div>`;

    const rowClass=isSub?`tbl-sub-row${collapsed?'':''} data-parent="${esc(t.parentId||'')}"`:'' ;
    // Tính hidden: subtask của task cha đang collapsed
    const isHidden=isSub&&!!S.tblCollapsed[t.parentId||''];
    const rowBg=isSub?'background:var(--s2)':'';

    return`<tr onclick="openTask('${esc(t.id)}')" style="${rowBg}"
      ${isSub?`class="tbl-sub-row${isHidden?' tbl-hidden':''}" data-parent="${esc(t.parentId||'')}"`:''}
      ${!isSub&&hasChildren?`id="tbl-parent-${esc(t.id)}"`:''}>
      <td>${typeBadge}</td>
      <td>${titleCell}</td>
      <td>${pb(t.priority)}</td><td>${sb(t.status)}</td>
      <td><div class="avs">${avs}</div></td>
      <td><span class="${dl.c}">${fd(t.deadline)}</span></td>
      <td>${(t.tags||[]).map(x=>`<span class="tag">${esc(x)}</span>`).join(' ')}</td>
      <td onclick="event.stopPropagation()"><div style="display:flex;gap:5px">
        ${canAct
          ?`<button class="btn bsm" onclick="openEditTask('${esc(t.id)}')">Sửa</button>
             <button class="btn bsm bd2" onclick="deleteTask('${esc(t.id)}')">Xoá</button>`
          :`<span style="font-size:10px;color:var(--tx3)">—</span>`}
      </div></td>
    </tr>`;
  }).join('');

  return`
  <div class="sh">
    <div style="font-size:18px;font-weight:700">Tất cả task</div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <button class="btn bsm" onclick="collapseAllTbl(true)">▶ Thu gọn subtask</button>
      <button class="btn bsm" onclick="collapseAllTbl(false)">▼ Mở rộng subtask</button>
      <button class="btn bp bsm" onclick="openCreateTask()">+ Tạo task mới</button>
    </div>
  </div>
  ${isMember?`<div class="pt-note" style="margin-bottom:14px">Hiển thị task bạn tự tạo và task được giao. Nhấn ▶/▼ để thu gọn/mở rộng subtask.</div>`:''}
  <div class="fr">
    ${['all','todo','inprogress','inreview','done'].map(s=>`<div class="fi3 ${S.fStat===s?'on':''}" onclick="S.fStat='${s}';rp('tasks')">${{all:'Tất cả',todo:'Todo',inprogress:'In Progress',inreview:'In Review',done:'Done'}[s]}</div>`).join('')}
    <span style="color:var(--bd2);padding:0 2px">|</span>
    ${['all','critical','high','medium','low'].map(p=>`<div class="fi3 ${S.fPri===p?'on':''}" onclick="S.fPri='${p}';rp('tasks')">${{all:'Ưu tiên',critical:'Critical',high:'High',medium:'Medium',low:'Low'}[p]}</div>`).join('')}
  </div>
  <div class="card" style="padding:0;overflow:hidden"><table class="dt">
    <thead><tr><th>Loại</th><th>Tiêu đề</th><th>Ưu tiên</th><th>Trạng thái</th><th>Người làm</th><th>Deadline</th><th>Tags</th><th>Hành động</th></tr></thead>
    <tbody>${rows||`<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--tx3)">Không có task nào</td></tr>`}</tbody>
  </table></div>`;
}

function deleteTask(id){
  // Tìm tất cả subtask con của task này
  const childIds=S.tasks.filter(t=>t.parentId===id).map(t=>t.id);
  const hasChildren=childIds.length>0;
  const msg=hasChildren
    ?`Xoá task này sẽ xoá luôn ${childIds.length} subtask con. Tiếp tục?`
    :'Xoá task này?';
  if(!confirm(msg))return;
  // Xoá cả task cha lẫn toàn bộ subtask
  const toDelete=[id,...childIds];
  S.tasks=S.tasks.filter(t=>!toDelete.includes(t.id));
  toDelete.forEach(tid=>{
    delete S.asn[tid];delete S.cmts[tid];delete S.logs[tid];
  });
  S.notifs=S.notifs.filter(n=>!toDelete.includes(n.tid));
  delete S.ganttCollapsed[id];
  save();rp(S.page);showToast('Đã xoá task.','red');
}

// ═══════════════════════════════════════════════
// GANTT — MS Project Style
// ═══════════════════════════════════════════════
const GANTT_COL_W=28;       // px mỗi ngày
const GANTT_ROW_H=36;       // px mỗi hàng
const GANTT_LEFT_W=560;     // px panel trái (có thể resize)

// Cột thông tin trái
const GCOLS=[
  {id:'title', label:'Tên công việc',   w:220, align:'left'},
  {id:'start',  label:'Bắt đầu',        w:84,  align:'center'},
  {id:'finish', label:'Kết thúc',       w:84,  align:'center'},
  {id:'dur',    label:'TG (ngày)',       w:60,  align:'center'},
  {id:'pct',    label:'% HT',           w:46,  align:'center'},
  {id:'assign', label:'Người thực hiện',w:80,  align:'left'},
];

function rGantt(){
  return`

        <option value="30">30 ngày</option>

      </select>
      <button class="btn bsm" onclick="collapseAllGantt(true)">▶ Thu gọn</button>
      <button class="btn bsm" onclick="collapseAllGantt(false)">▼ Mở rộng</button>
      <button class="btn bsm" onclick="drawGantt()" title="Về hôm nay">⌂ Hôm nay</button>
      ${S.cur.role!=='member'?`<button class="btn bp bsm" onclick="openCreateTask()">+ Tạo task</button>`:''}
    </div>
  </div>
  <div class="gantt-outer" id="gantt-outer">
    <div class="gantt-split" id="gantt-split">
      <!-- LEFT PANEL -->

      <!-- RIGHT PANEL -->

        <div class="gantt-thead" id="gr-thead" style="flex-shrink:0"></div>
        <div class="gantt-body-right" id="gr-body" style="flex:1;position:relative"></div>
      </div>
    </div>
  </div>
  <!-- Legend -->
  <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:10px;color:var(--tx2);margin-top:10px;align-items:center">
    <span><span style="display:inline-block;width:22px;height:8px;border-radius:2px;background:#6b7280;margin-right:5px;vertical-align:middle"></span>Todo</span>
    <span><span style="display:inline-block;width:22px;height:8px;border-radius:2px;background:var(--acc);margin-right:5px;vertical-align:middle"></span>In Progress</span>
    <span><span style="display:inline-block;width:22px;height:8px;border-radius:2px;background:var(--purple);margin-right:5px;vertical-align:middle"></span>In Review</span>
    <span><span style="display:inline-block;width:22px;height:8px;border-radius:2px;background:var(--green);margin-right:5px;vertical-align:middle"></span>Done</span>
    <span><span style="display:inline-block;width:22px;height:8px;border-radius:2px;background:var(--red);margin-right:5px;vertical-align:middle"></span>Quá hạn</span>
    <span style="color:var(--bd2)">|</span>
    <span>Độ rộng thanh = thời lượng thực tế · Màu đậm = đã hoàn thành</span>

function collapseAllGantt(collapse){
  const parents=S.tasks.filter(t=>!t.parentId&&S.tasks.some(st=>st.parentId===t.id));
  parents.forEach(t=>{S.ganttCollapsed[t.id]=collapse;});
  drawGantt();
}

function toggleGanttCollapse(parentId){
  S.ganttCollapsed[parentId]=!S.ganttCollapsed[parentId];
  drawGantt();
}

function drawGantt(){
  const glThead=document.getElementById('gl-thead');
  const glBody=document.getElementById('gl-body');
  const grThead=document.getElementById('gr-thead');
  const grBody=document.getElementById('gr-body');
  if(!glThead)return;

  const fval=document.getElementById('gf')?.value||'all';
  const rangeDays=parseInt(document.getElementById('grange')?.value||'60');

  // ── Dữ liệu ──
  let parents=[...S.tasks.filter(t=>!t.parentId)];
  if(fval==='mine')parents=parents.filter(t=>(S.asn[t.id]||[]).includes(S.cur.id)||S.tasks.some(st=>st.parentId===t.id&&(S.asn[st.id]||[]).includes(S.cur.id)));
  else if(fval==='active')parents=parents.filter(t=>t.status!=='done'&&t.status!=='cancelled');
  if(S.cur.role==='member')parents=parents.filter(t=>(S.asn[t.id]||[]).includes(S.cur.id)||t.creator===S.cur.id||S.tasks.some(st=>st.parentId===t.id&&((S.asn[st.id]||[]).includes(S.cur.id)||st.creator===S.cur.id)));

  if(!parents.length){
    glBody.innerHTML=`<div style="padding:32px;text-align:center;color:var(--tx3);font-size:12px">Không có task nào để hiển thị</div>`;
    grBody.innerHTML='';grThead.innerHTML='';
    glThead.innerHTML='';
    return;
  }

  // ── Tính timeline ──
  const today=new Date();today.setHours(0,0,0,0);
  const todayMs=today.getTime();
  // Bắt đầu từ đầu tuần chứa ngày sớm nhất của task, hoặc 7 ngày trước hôm nay
  const allDates=parents.flatMap(t=>{
    const ds=[t.start||t.created,t.deadline].filter(Boolean).map(d=>new Date(d).getTime());
    S.tasks.filter(st=>st.parentId===t.id).forEach(st=>{
      [st.start||st.created,st.deadline].filter(Boolean).forEach(d=>ds.push(new Date(d).getTime()));
    });
    return ds;
  });
  const minDate=allDates.length?Math.min(...allDates,todayMs-7*86400000):todayMs-7*86400000;
  // Lùi về đầu tuần (Thứ 2)
  const rStart=new Date(minDate);
  rStart.setDate(rStart.getDate()-rStart.getDay()+(rStart.getDay()===0?-6:1));
  rStart.setHours(0,0,0,0);
  const rEnd=new Date(rStart.getTime()+rangeDays*86400000);

  const totalDays=Math.ceil((rEnd-rStart)/86400000);
  const DW=GANTT_COL_W; // px per day
  const totalChartW=totalDays*DW;

  // Days array
  const days=[];
  for(let i=0;i<totalDays;i++){
    const d=new Date(rStart.getTime()+i*86400000);
    days.push(d);
  }

  // ── Build rows list (parents + visible children) ──
  const rows=[];
  parents.forEach(t=>{
    const children=S.tasks.filter(st=>st.parentId===t.id);
    const hasChildren=children.length>0;
    const collapsed=!!S.ganttCollapsed[t.id];
    rows.push({task:t,isParent:true,hasChildren,collapsed,indent:0});
    if(!collapsed&&hasChildren){
      children.forEach(st=>{
        rows.push({task:st,isParent:false,hasChildren:false,collapsed:false,indent:1});
      });
    }
  });

  const totalH=rows.length*GANTT_ROW_H;
  const RH=GANTT_ROW_H;

  // ── LEFT HEADER ──
  const lhColsHtml=GCOLS.map(c=>`<div class="gh-cell" style="width:${c.w}px;min-width:${c.w}px;justify-content:${c.align==='center'?'center':'flex-start'}">${c.label}</div>`).join('');
  const lhTotalW=GCOLS.reduce((a,c)=>a+c.w,0);
  glThead.innerHTML=`<div class="gantt-hrow" style="height:52px">${lhColsHtml}</div>`;

  // ── LEFT BODY ──
  const statusColor={todo:'#6b7280',inprogress:'var(--acc)',inreview:'var(--purple)',done:'var(--green)',cancelled:'#4a5470'};
  const statusLabel={todo:'Todo',inprogress:'In Progress',inreview:'In Review',done:'Done',cancelled:'Cancelled'};

  const calcPct=t=>{
    if(t.status==='done')return 100;
    if(t.status==='todo')return 0;
    const subs=t.subs||[];
    if(subs.length)return Math.round(subs.filter(s=>s.d).length/subs.length*100);
    // Subtask con
    const children=S.tasks.filter(st=>st.parentId===t.id);
    if(children.length)return Math.round(children.filter(s=>s.status==='done').length/children.length*100);
    return 50; // inprogress without subtasks = 50%
  };

  const durDays=t=>{
    const s=new Date(t.start||t.created);
    const e=t.deadline?new Date(t.deadline):null;
    if(!e)return '—';
    return Math.max(1,Math.ceil((e-s)/86400000))+'d';
  };

  let lbHtml='';
  rows.forEach((row,ri)=>{
    const t=row.task;
    const pct=calcPct(t);
    const aIds=(S.asn[t.id]||[]).slice(0,2);
    const aNames=aIds.map(id=>uby(id)?.full_name?.split(' ').slice(-1)[0]||'?').join(', ');
    const sc=t.status!=='done'&&t.deadline&&new Date(t.deadline)<new Date()?'var(--red)':(statusColor[t.status]||'#6b7280');
    const bg=row.indent?'var(--bg)':'var(--s2)';

    // Title cell
    const indent=row.indent*16;
    const collapseBtn=row.hasChildren
      ?`<button class="gc-collapse" onclick="event.stopPropagation();toggleGanttCollapse('${esc(t.id)}')" title="${row.collapsed?'Mở rộng':'Thu gọn'}">${row.collapsed?'▶':'▼'}</button>`
      :`<span style="width:14px;flex-shrink:0"></span>`;
    const statusDot=`<span style="width:6px;height:6px;border-radius:50%;background:${sc};flex-shrink:0;display:inline-block"></span>`;

    const titleW=GCOLS[0].w;
    const titleHtml=`<div class="gh-cell" style="width:${titleW}px;min-width:${titleW}px;padding-left:${8+indent}px;gap:4px;background:${bg};cursor:pointer" onclick="openTask('${esc(t.id)}')">
      ${collapseBtn}${statusDot}
      <div class="gc-name" style="flex:1;font-size:${row.indent?10:11}px;font-weight:${row.indent?500:600};color:var(--tx)" title="${esc(t.title)}">${esc(t.title)}</div>
    </div>`;

    const startStr=t.start?fd(t.start):fd(t.created);
    const endStr=t.deadline?fd(t.deadline):'—';
    const dur=durDays(t);

    // Progress bar mini
    const pctBar=`<div style="display:flex;align-items:center;gap:3px;width:100%;justify-content:center">
      <div style="width:24px;height:5px;background:var(--s3);border-radius:2px;overflow:hidden;flex-shrink:0">
        <div style="width:${pct}%;height:100%;background:${pct===100?'var(--green)':'var(--acc)'};border-radius:2px"></div>
      </div>
      <span style="font-size:9px;color:var(--tx2)">${pct}%</span>
    </div>`;

    const avHtml=aIds.map(id=>avH(uby(id),'av av20')).join('');

    lbHtml+=`<div class="gantt-hrow" style="height:${RH}px;background:${bg};border-bottom:1px solid var(--bd)">
      ${titleHtml}
      <div class="gh-cell" style="width:${GCOLS[1].w}px;min-width:${GCOLS[1].w}px;justify-content:center;font-size:10px;background:${bg}">${startStr}</div>
      <div class="gh-cell" style="width:${GCOLS[2].w}px;min-width:${GCOLS[2].w}px;justify-content:center;font-size:10px;color:${t.deadline&&!row.indent?sc:'var(--tx)'};background:${bg}">${endStr}</div>
      <div class="gh-cell" style="width:${GCOLS[3].w}px;min-width:${GCOLS[3].w}px;justify-content:center;font-size:10px;background:${bg}">${dur}</div>
      <div class="gh-cell" style="width:${GCOLS[4].w}px;min-width:${GCOLS[4].w}px;padding:0 4px;background:${bg}">${pctBar}</div>
      <div class="gh-cell" style="width:${GCOLS[5].w}px;min-width:${GCOLS[5].w}px;background:${bg};padding:0 4px">${avHtml||'<span style="font-size:9px;color:var(--tx3)">—</span>'}</div>
    </div>`;
  });
  glBody.innerHTML=lbHtml;
  glBody.style.overflowY='hidden';

  // ── RIGHT HEADER: Month row + Day row ──
  // Month groups
  const months=[];
  let curMonth=null,curStart=0,curCount=0;
  days.forEach((d,i)=>{
    const mk=`${d.getFullYear()}-${d.getMonth()}`;
    if(mk!==curMonth){
      if(curMonth!==null)months.push({label:curMonth,start:curStart,count:curCount});
      curMonth=mk;curStart=i;curCount=1;
    } else {curCount++;}
  });
  if(curMonth!==null)months.push({label:curMonth,start:curStart,count:curCount});

  const monthNames=['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
  const monthRowHtml=months.map(m=>{
    const d=days[m.start];
    return`<div class="gantt-month-cell" style="width:${m.count*DW}px;min-width:${m.count*DW}px">${monthNames[d.getMonth()]} ${d.getFullYear()}</div>`;
  }).join('');

  const dayRowHtml=days.map(d=>{
    const isToday=d.getTime()===todayMs;
    const isWeekend=d.getDay()===0||d.getDay()===6;
    const cls=isToday?'today':(isWeekend?'weekend':'');
    const dayNames=['CN','T2','T3','T4','T5','T6','T7'];
    return`<div class="gantt-day-cell ${cls}" style="width:${DW}px;min-width:${DW}px;flex-direction:column;gap:0;height:26px;font-size:8px">
      <span style="font-size:9px;font-weight:600;line-height:1.1">${d.getDate()}</span>
      <span style="font-size:7px;opacity:.7">${dayNames[d.getDay()]}</span>
    </div>`;
  }).join('');

  grThead.innerHTML=`
    <div class="gantt-hrow" style="height:26px">${monthRowHtml}</div>
    <div class="gantt-hrow" style="height:26px">${dayRowHtml}</div>`;

  // ── RIGHT BODY: chart area ──
  // Background grid
  const bgCols=days.map((d,i)=>{
    const isToday=d.getTime()===todayMs;
    const isWeekend=d.getDay()===0||d.getDay()===6;
    const bg=isToday?'rgba(76,139,245,.08)':isWeekend?'rgba(128,128,128,.05)':'transparent';
    return`<div style="position:absolute;left:${i*DW}px;top:0;width:${DW}px;bottom:0;background:${bg};border-right:1px solid var(--bd);opacity:1;pointer-events:none"></div>`;
  }).join('');

  // Today vertical line
  const todayX=(todayMs-rStart.getTime())/86400000*DW;
  const todayLine=todayMs>=rStart.getTime()&&todayMs<rEnd.getTime()
    ?`<div class="gantt-today-line" style="left:${todayX}px"></div>`:'';

  // Bars
  const barColors={todo:'#5a6370',inprogress:'#3b7dd8',inreview:'#7c5cbf',done:'#229a5e',cancelled:'#4a5470'};
  const barOverdue='#c0392b';

  let barHtml='';
  rows.forEach((row,ri)=>{
    const t=row.task;
    const s=new Date(t.start||t.created);s.setHours(0,0,0,0);
    const e=t.deadline?new Date(t.deadline):new Date(s.getTime()+86400000*7);e.setHours(23,59,59,999);
    const sMs=s.getTime();const eMs=e.getTime();

    const bl=Math.max(0,(sMs-rStart.getTime())/86400000)*DW;
    const br=Math.min(totalChartW,(eMs-rStart.getTime())/86400000*DW);
    const bw=Math.max(DW*.4,br-bl);
    const bt=ri*RH;

    const isOver=t.status!=='done'&&t.deadline&&new Date(t.deadline)<new Date();
    const bc=isOver?barOverdue:(barColors[t.status]||barColors.todo);
    const pct=calcPct(t);
    const dur=Math.max(0,Math.ceil((eMs-sMs)/86400000));

    const isSub=row.indent>0;
    const barClass=isSub?'gbar2 gbar2-sub':'gbar2';
    const barTop=isSub?bt+10:bt+8;
    const barH=isSub?16:20;

    // Progress overlay inside bar
    const progressW=(pct/100)*bw;
    const labelMinW=DW*3;
    const barLabel=bw>labelMinW?`<div class="gbar2-label" style="position:absolute;left:${progressW+4}px;top:0;bottom:0;display:flex;align-items:center">${esc(t.title.slice(0,Math.floor(bw/7)-2))}${t.title.length>Math.floor(bw/7)-2?'…':''}</div>`:'';

    const tooltip=`${esc(t.title)} | ${fd(t.start||t.created)} → ${fd(t.deadline)||'—'} | ${dur}d | ${pct}% | ${statusLabel[t.status]||t.status}`;

    barHtml+=`<div class="${barClass}" style="left:${bl}px;top:${barTop}px;width:${bw}px;height:${barH}px;background:${bc}" onclick="openTask('${esc(t.id)}')" title="${tooltip}">
      <div class="gbar2-progress" style="width:${progressW}px"></div>
      ${barLabel}
    </div>`;

    // Milestone diamond nếu duration = 0
    if(t.deadline&&dur===0){
      barHtml+=`<div class="gbar2-diamond" style="left:${bl-6}px;top:${bt+12}px" onclick="openTask('${esc(t.id)}')" title="${tooltip}"></div>`;
    }
  });

  grBody.innerHTML=`<div style="position:relative;width:${totalChartW}px;height:${totalH}px;min-height:100%">
    ${bgCols}${todayLine}${barHtml}
  </div>`;

  // ── Sync scroll: left body ↔ right body (vertical) ──
  const rb=grBody;
  const lb=glBody;
  let syncing=false;
  rb.addEventListener('scroll',()=>{
    if(syncing)return;syncing=true;
    lb.scrollTop=rb.scrollTop;
    syncing=false;
  },{passive:true});
  lb.addEventListener('scroll',()=>{
    if(syncing)return;syncing=true;
    rb.scrollTop=lb.scrollTop;
    syncing=false;
  },{passive:true});

  // Scroll today into view (center)
  if(todayMs>=rStart.getTime()&&todayMs<rEnd.getTime()){
    const rightEl=document.getElementById('gantt-right');
    if(rightEl){
      setTimeout(()=>{
        const centerX=todayX-rightEl.clientWidth/2;

function calcAn(){
  const r={by:{},recs:[]};
  const wu=S.users.filter(u=>u.role!=='admin');
  wu.forEach(u=>{
    const mt=S.tasks.filter(t=>(S.asn[t.id]||[]).includes(u.id));
    const active=mt.filter(t=>t.status!=='done'&&t.status!=='cancelled');
    const done=mt.filter(t=>t.status==='done');
    const over=active.filter(t=>t.deadline&&new Date(t.deadline)<new Date());
    let ws=0;active.forEach(t=>ws+=pv(t.priority));over.forEach(()=>ws+=10);
    const wl=Math.min(100,ws/0.24);
    const cap=done.length>0?Math.min(100,Math.round(done.filter(t=>!t.deadline||new Date(t.deadline)>=new Date(t.created+'T00:00:00')).length/done.length*100)):100;
    r.by[u.id]={wl,cap,active:active.length,done:done.length,over:over.length};
  });
  wu.filter(u=>(r.by[u.id]||{}).wl>=80).forEach(u=>{const d=r.by[u.id];r.recs.push({lv:'d',text:`${u.full_name.split(' ').slice(-1)[0]} quá tải (${Math.round(d.wl)}%, ${d.active} task). Điều phối ngay!`});});
  wu.filter(u=>(r.by[u.id]||{}).over>0).forEach(u=>{const d=r.by[u.id];r.recs.push({lv:'w',text:`${u.full_name.split(' ').slice(-1)[0]} có ${d.over} task quá hạn.`});});
  wu.filter(u=>(r.by[u.id]||{}).wl<20&&S.tasks.length>0).forEach(u=>{r.recs.push({lv:'i',text:`${u.full_name.split(' ').slice(-1)[0]} còn dư địa, có thể nhận thêm task.`});});
  wu.filter(u=>(r.by[u.id]||{}).cap<40&&(r.by[u.id]||{}).done>=2).forEach(u=>{const d=r.by[u.id];r.recs.push({lv:'w',text:`${u.full_name.split(' ').slice(-1)[0]} hoàn thành đúng hạn thấp (${d.cap}%). Cần hỗ trợ.`});});
  if(!r.recs.length)r.recs.push({lv:'o',text:'Phân bổ công việc cân bằng. Hệ thống hoạt động tốt.'});
  return r;
}

    <div class="fg"><label class="fl">Họ và tên đầy đủ *</label><input class="fi2" id="nu-name" placeholder="Ví dụ: Nguyễn Văn An" autocomplete="off"></div>

      <div class="fg"><label class="fl">Tên đăng nhập *</label><input class="fi2" id="nu-user" placeholder="nguyenvana" autocomplete="off" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')"><div style="font-size:10px;color:var(--tx3);margin-top:4px">Chỉ chữ thường, số, dấu gạch dưới</div></div>
      <div class="fg"><label class="fl">Vai trò</label><select class="fi2" id="nu-role"><option value="member">Thành viên (Member)</option><option value="manager">Quản lý (Manager)</option></select></div>

      <div class="fg"><label class="fl">Xác nhận mật khẩu *</label><input class="fi2" type="password" id="nu-pass2" placeholder="Nhập lại mật khẩu" autocomplete="new-password"></div>

function createUser(){
  const name=document.getElementById('nu-name').value.trim();
  const username=document.getElementById('nu-user').value.trim();
  const pass=document.getElementById('nu-pass').value;
  const pass2=document.getElementById('nu-pass2').value;
  const role=document.getElementById('nu-role').value;
  const err=document.getElementById('nu-err');err.textContent='';
  if(!name){err.textContent='Vui lòng nhập họ và tên.';return;}
  if(!username){err.textContent='Vui lòng nhập tên đăng nhập.';return;}
  if(!/^[a-z0-9_]+$/.test(username)){err.textContent='Username chỉ dùng chữ thường, số và gạch dưới.';return;}
  if(S.users.find(u=>u.username===username)){err.textContent=`Username "@${username}" đã tồn tại.`;return;}
  if(pass.length<6){err.textContent='Mật khẩu tối thiểu 6 ký tự.';return;}
  if(pass!==pass2){err.textContent='Xác nhận mật khẩu không khớp.';return;}
  const cols=['#4c8bf5','#2cc97a','#f0a220','#ef4444','#9b7cf4','#22d3ee','#ec4899','#f97316','#14b8a6','#a855f7'];
  S.users.push({id:'u'+Date.now(),username,password:pass,full_name:name,role,color:cols[S.users.length%cols.length]});
  save();closeModal();rp('admin');showToast(`Đã tạo tài khoản <b>@${username}</b>!`,'green');
}

  const u=S.users.find(x=>x.id===id);
  if(!u)return;
  showModal(`
  <div class="mh"><div style="display:flex;align-items:center;gap:12px">${avH(u,'av av32')}<div><div style="font-size:14px;font-weight:700">Chỉnh sửa tài khoản</div><div style="font-size:11px;color:var(--tx2)">@${esc(u.username)}</div></div></div><button class="cx" onclick="closeModal()">×</button></div>
  <div class="mb">
    <div class="fg"><label class="fl">Họ và tên</label><input class="fi2" id="eu-name" value="${esc(u.full_name)}"></div>
    <div class="fg"><label class="fl">Vai trò</label><select class="fi2" id="eu-role"><option value="member" ${u.role==='member'?'selected':''}>Thành viên (Member)</option><option value="manager" ${u.role==='manager'?'selected':''}>Quản lý (Manager)</option></select></div>
    <div style="background:var(--s2);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;margin-top:4px">
      <div style="font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">Đặt lại mật khẩu</div>
      <div class="frow">
        <div class="fg" style="margin-bottom:0"><label class="fl">Mật khẩu mới <span style="font-weight:400;text-transform:none">(để trống = không đổi)</span></label><input class="fi2" type="password" id="eu-pass" placeholder="Mật khẩu mới..." autocomplete="new-password"></div>
        <div class="fg" style="margin-bottom:0"><label class="fl">Xác nhận</label><input class="fi2" type="password" id="eu-pass2" placeholder="Nhập lại..." autocomplete="new-password"></div>

function saveUser(id){
  const u=S.users.find(x=>x.id===id);
  if(!u)return;
  const name=document.getElementById('eu-name').value.trim();
  const role=document.getElementById('eu-role').value;
  const pass=document.getElementById('eu-pass').value;
  const pass2=document.getElementById('eu-pass2').value;
  const err=document.getElementById('eu-err');err.textContent='';
  if(!name){err.textContent='Họ tên không được để trống.';return;}
  if(pass){
    if(pass.length<6){err.textContent='Mật khẩu tối thiểu 6 ký tự.';return;}
    if(pass!==pass2){err.textContent='Xác nhận mật khẩu không khớp.';return;}
    u.password=pass;if(S.cur.id===id)S.cur.password=pass;
  }
  u.full_name=name;u.role=role;
  if(S.cur.id===id){S.cur.full_name=name;S.cur.role=role;document.getElementById('tb-name').textContent=name.split(' ').slice(-1)[0];}
  save();closeModal();rp('admin');
  showToast('Đã lưu thay đổi @'+u.username+(pass?' + đặt lại mật khẩu':'')+'!','blue');
}

function openDeleteUser(id){
  const u=S.users.find(x=>x.id===id);
  if(!u)return;
  showModal(`
  <div class="mh"><div style="font-size:14px;font-weight:700;color:var(--red)">Xoá tài khoản</div><button class="cx" onclick="closeModal()">×</button></div>

    </div>
    <div style="font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:12px">Tài khoản sẽ bị xoá vĩnh viễn. Task đang giao cho tài khoản này vẫn giữ nguyên.</div>
    <div class="fg" style="margin-bottom:0"><label class="fl">Gõ username để xác nhận: <code style="background:var(--s2);padding:1px 6px;border-radius:4px;color:var(--amber)">${esc(u.username)}</code></label><input class="fi2" id="dc" placeholder="Nhập username..." autocomplete="off" oninput="this.value=this.value.toLowerCase()"></div>
